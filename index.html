<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>THÉP TAM GIANG PROFILE</title>
<link rel="icon" href="./profile-cover-removebg-preview.png">
<style>
/* ═══ RESET ══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#202124;
}

/* ═══ LAYOUT ══════════════════════════════════════════════════════════ */
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ══════════════════════════════════════════════════════════ */
.sidebar {
    width:200px;
    background:#2b2b2b;
    overflow-y:auto;
    overflow-x:hidden;
    border-right:1px solid #3c4043;
    padding:12px 8px;
    display:flex;
    flex-direction:column;
    height:100vh;
    flex-shrink:0;
}
.thumb {
    width:100%;
    margin-bottom:14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.thumb-inner {
    width:100%;
    aspect-ratio:210/297;
    background:#fff;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}
.thumb-inner img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
.thumb span {
    display:block;
    text-align:center;
    color:#bbb;
    margin-top:4px;
    font-size:12px;
}
.thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

/* ═══ MAIN ════════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR — DESKTOP ════════════════════════════════════════════════ */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 14px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    justify-self:start;
}
.toolbar-center {
    display:flex;
    align-items:center;
    justify-content:center;
}
#zoom-controls {
    display:flex;
    align-items:center;
    gap:6px;
}
.zoom-btn {
    width:32px; height:32px;
    border:none;
    background:#3c4043;
    color:#fff;
    cursor:pointer;
    border-radius:4px;
    font-size:22px;
    font-weight:300;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    flex-shrink:0;
}
.zoom-btn:hover { background:#5f6368; }
.zoom-val {
    width:60px; height:28px;
    background:#202124;
    border:1px solid #5f6368;
    color:#fff;
    text-align:center;
    font-size:13px;
    outline:none;
    border-radius:3px;
    cursor:default;
}
.toolbar-right {
    display:flex;
    align-items:center;
    gap:8px;
    justify-self:end;
}
.tool-btn {
    width:34px; height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background:#3c4043;
    cursor:pointer;
    border:none;
    text-decoration:none;
    flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT ════════════════════════════════════════════════════════ */
.content {
    flex:1;
    overflow-x:hidden;
    overflow-y:auto;
    padding:24px 0;
    scroll-behavior:smooth;
}

/* ─── TRANG ĐƠN ─── */
.page {
    width:794px;
    height:1123px;
    background:#fff;
    margin:0 auto 24px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
    position:relative;
    flex-shrink:0;
}
.page > img {
    width:100%; height:100%;
    display:block;
    object-fit:fill;
}

/* ═══ MOBILE TOOLBAR ══════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }

    .toolbar {
        height:auto;
        display:flex;
        flex-direction:column;
        align-items:stretch;
        padding:8px 10px 8px;
        gap:0;
        grid-template-columns:unset;
    }

    /* Hàng 1: tên profile */
    .toolbar-title {
        width:100%;
        text-align:center;
        font-size:13px;
        padding-bottom:8px;
        border-bottom:1px solid #3c4043;
        justify-self:unset;
        white-space:nowrap;
        overflow:visible;
    }

    /* Hàng 2: zoom + icons */
    .toolbar-row2 {
        display:flex !important;
        align-items:center;
        padding-top:8px;
        width:100%;
        position:relative;
    }

    /* Zoom tuyệt đối ở giữa */
    .toolbar-center {
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;
        pointer-events:auto;
    }

    /* Icons đẩy sang phải */
    .toolbar-right {
        margin-left:auto;
        display:flex;
        align-items:center;
        gap:6px;
    }

    .zoom-btn { width:38px; height:38px; font-size:26px; }
    .zoom-val  { width:54px; height:32px; font-size:13px; }
    .tool-btn  { width:38px; height:38px; }

    /* Trang mobile */
    .page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
}

/* ═══ PRINT: Desktop ══════════════════════════════════════════════════
   Mục tiêu: in đúng như giao diện web — mỗi trang là 1 ảnh A4
   KHÔNG scale, KHÔNG thêm margin ngoài
════════════════════════════════════════════════════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * {
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
    }
    .sidebar, .toolbar, #toolbar-row2, #print-overlay { display:none !important; }

    html, body {
        background:white !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important;
        padding:0 !important; margin:0 !important;
    }
    .page {
        display:block !important;
        width:210mm !important;
        height:297mm !important;
        min-height:297mm !important; max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important;
        transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
    }
    .page:last-child {
        page-break-after:avoid !important; break-after:avoid !important;
    }
    .page > img {
        width:210mm !important; height:297mm !important;
        object-fit:fill !important; display:block !important;
    }
}

/* ═══ OVERLAY ════════════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; font-size:15px;
}
#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,.2); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>

<script>
/* ═══ MOBILE LAYOUT SWITCH ══════════════════════════════════════════ */
function applyLayout() {
    const isMobileLayout = window.innerWidth <= 768;
    const row2 = document.getElementById('toolbar-row2');
    const zoomDesktop = document.getElementById('zoom-slot-desktop');
    const iconsDesktop = document.getElementById('icons-slot-desktop');

    if (isMobileLayout) {
        row2.style.display = 'flex';
        zoomDesktop.style.display = 'none';
        iconsDesktop.style.display = 'none';
    } else {
        row2.style.display = 'none';
        zoomDesktop.style.display = 'flex';
        iconsDesktop.style.display = 'flex';
    }
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ═══ ZOOM ══════════════════════════════════════════════════════════ */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel / 100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff / 2}px`;
        p.style.marginBottom = `${24 - diff / 2}px`;
    });
    document.getElementById('zoom-display').value   = zoomLevel + '%';
    document.getElementById('zoom-display-m').value = zoomLevel + '%';
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }

function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.getElementById('zoom-display').value   = '100%';
    document.getElementById('zoom-display-m').value = '100%';
}

function scrollToPage(idx) {
    const el = document.getElementById('p' + idx);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior: 'smooth' });
}

/* ═══ DETECT BROWSER ════════════════════════════════════════════════ */
const ua = navigator.userAgent;
const isIOS           = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS     = /CriOS/i.test(ua);
const isSafariIOS     = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS/i.test(ua);
const isAndroid       = /Android/i.test(ua);
const isChromeAndroid = isAndroid && /Chrome/i.test(ua) && !/Firefox/i.test(ua);
const needsIframe     = isChromeIOS || isChromeAndroid;

/* ═══ DANH SÁCH TRANG ══════════════════════════════════════════════ */
const PAGES = [
    {src:'./profile-cover.jpg'},
    {src:'./company-intro-01.jpg'},
    {src:'./company-intro-02.jpg'},
    {src:'./main-products.jpg'},
    {src:'./thep-products.jpg'},
    {src:'./ximang-products.jpg'},
    {src:'./thephinh-products.jpg'},
    {src:'./vlxd-products.jpg'},
    {src:'./project-11.jpg'},
    {src:'./project-12.jpg'},
    {src:'./project-03.jpg'},
    {src:'./project-08.jpg'},
    {src:'./project-09.jpg'},
    {src:'./project-10.jpg'},
    {src:'./project-04.jpg'},
    {src:'./project-07.jpg'},
    {src:'./project-01.jpg'},
    {src:'./project-02.jpg'},
];

function getBase() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/') + 1);
}

/* ═══ IFRAME PRINT — Chrome iOS & Chrome Android ═══════════════════
   Build iframe với body width=794px, mỗi page height=1123px.
   KHÔNG include toolbar, KHÔNG include sidebar.
   Mỗi ảnh = 1 div.p riêng biệt → đúng 18 trang, không bị nhân đôi.
══════════════════════════════════════════════════════════════════════ */
function buildIframeHTML() {
    const base = getBase();
    const W = 794, H = 1123;
    const abs = r => base + r.replace(/^\.\//, '');

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-print-color-adjust:exact!important;
  print-color-adjust:exact!important}
@page{size:210mm 297mm;margin:0}
html,body{width:${W}px;background:#fff;margin:0;padding:0}
.p{
  display:block;width:${W}px;height:${H}px;
  overflow:hidden;background:#fff;
  page-break-after:always;break-after:page;
  page-break-inside:avoid;break-inside:avoid
}
.p:last-child{page-break-after:avoid;break-after:avoid}
.p>img{display:block;width:${W}px;height:${H}px;object-fit:fill}
</style></head><body>`;

    PAGES.forEach(p => {
        html += `<div class="p"><img src="${abs(p.src)}"></div>`;
    });

    return html + `</body></html>`;
}

function printViaIframe() {
    const msgEl = document.getElementById('overlay-msg');
    msgEl.textContent = 'Đang tải ảnh để in…';

    const old = document.getElementById('_pf');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id = '_pf';
    iframe.style.cssText =
        'position:fixed;top:-9999px;left:0;' +
        'width:794px;height:1px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(buildIframeHTML());
    doc.close();

    function waitImgs(cb) {
        const imgs = Array.from(doc.querySelectorAll('img'));
        let n = imgs.filter(i => !i.complete).length;
        if (!n) return cb();
        imgs.forEach(img => {
            if (!img.complete) {
                const fn = () => { if (!--n) cb(); };
                img.addEventListener('load',  fn, {once:true});
                img.addEventListener('error', fn, {once:true});
            }
        });
    }

    waitImgs(() => {
        msgEl.textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            document.getElementById('print-overlay').classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => iframe.remove(), 15000);
            }, 400);
        }, 400);
    });
}

/* ═══ SAFARI iOS PRINT ══════════════════════════════════════════════
   Inject CSS với kích thước px tính theo screen.width (portrait).
   Đảm bảo chỉ có 18 trang, mỗi trang 1 ảnh.
══════════════════════════════════════════════════════════════════════ */
let _safariEl = null;

function buildSafariCSS() {
    const pw  = Math.min(screen.width, screen.height);
    const ph  = Math.round(pw * 297 / 210);

    return `@media print{
@page{size:${pw}px ${ph}px;margin:0!important}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
#print-overlay,.sidebar,.toolbar,#toolbar-row2{display:none!important}
html,body{
  background:#fff!important;
  width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;overflow:visible!important
}
.viewer,.main,.content{
  display:block!important;
  width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;
  overflow:visible!important;background:#fff!important
}
.page{
  display:block!important;
  width:${pw}px!important;
  height:${ph}px!important;min-height:${ph}px!important;max-height:${ph}px!important;
  margin:0!important;padding:0!important;
  border:none!important;box-shadow:none!important;
  overflow:hidden!important;background:#fff!important;transform:none!important;
  page-break-after:always!important;break-after:page!important;
  page-break-inside:avoid!important;break-inside:avoid!important
}
.page:last-child{page-break-after:avoid!important;break-after:avoid!important}
.page>img{
  width:${pw}px!important;height:${ph}px!important;
  object-fit:fill!important;display:block!important
}
}`;
}

function injectSafariCSS() {
    if (_safariEl) _safariEl.remove();
    _safariEl = document.createElement('style');
    _safariEl.id = '_safari_print';
    _safariEl.textContent = buildSafariCSS();
    document.head.appendChild(_safariEl);
}

/* ═══ WAIT IMAGES ═══════════════════════════════════════════════════ */
function waitMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let n = imgs.filter(i => !i.complete).length;
    if (!n) return cb();
    imgs.forEach(img => {
        if (!img.complete) {
            const fn = () => { if (!--n) cb(); };
            img.addEventListener('load',  fn, {once:true});
            img.addEventListener('error', fn, {once:true});
        }
    });
}

/* ═══ MAIN PRINT ════════════════════════════════════════════════════ */
function printProfile() {
    const overlay = document.getElementById('print-overlay');
    resetZoom();
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (needsIframe) {
        /* Chrome iOS + Chrome Android: dùng iframe sạch, không có toolbar */
        printViaIframe();
    } else if (isSafariIOS) {
        /* Safari iOS: inject CSS rồi print trên document hiện tại */
        injectSafariCSS();
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 400);
            }, 600);
        });
    } else {
        /* Desktop & Firefox Android */
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

/* Ctrl+P fallback */
window.addEventListener('beforeprint', () => {
    resetZoom();
    if (isSafariIOS) injectSafariCSS();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
