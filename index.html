<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THÉP TAM GIANG PROFILE</title>

<link rel="icon" href="./profile-cover-removebg-preview.png">

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#202124;
}

/* =========================
   VIEWER
========================= */

.viewer{
  display:flex;
  width:100%;
  height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  width:260px;
  background:#2b2b2b;
  overflow-y:auto;
  border-right:1px solid #3c4043;
  padding:14px 12px;
}

.sidebar::-webkit-scrollbar{
  width:10px;
}

.sidebar::-webkit-scrollbar-track{
  background:#202124;
}

.sidebar::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* =========================
   THUMB
========================= */

.thumb{
  width:100%;
  margin-bottom:18px;
  background:#202124;
  border:2px solid transparent;
  padding:10px;
  cursor:pointer;
  transition:.2s;
}

.thumb:hover{
  border-color:#8ab4f8;
}

.thumb img{
  width:100%;
  display:block;
  background:#fff;
}

.thumb span{
  display:block;
  text-align:center;
  color:#fff;
  margin-top:10px;
  font-size:15px;
}

/* =========================
   MAIN
========================= */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* =========================
   TOOLBAR
========================= */

.toolbar{
  height:56px;
  background:#2b2b2b;
  border-bottom:1px solid #3c4043;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  position:relative;
  z-index:10;
}

.toolbar-title{
  color:#fff;
  font-size:18px;
  font-weight:600;
}

/* =========================
   ZOOM
========================= */

.toolbar-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

#zoom-controls{
  display:flex;
  align-items:center;
  gap:10px;
}

#zoom-controls button{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  color:#fff;
  cursor:pointer;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#zoom-controls button:hover{
  background:#3c4043;
}

#zoom-controls svg{
  width:22px;
  height:22px;
  fill:#fff;
}

#zoom-controls input{
  width:65px;
  height:32px;
  background:#202124;
  border:1px solid #5f6368;
  color:#fff;
  text-align:center;
  font-size:14px;
  outline:none;
  border-radius:4px;
}

/* =========================
   PRINT
========================= */

.tool-btn{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  color:#fff;
  cursor:pointer;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.tool-btn svg{
  width:22px;
  height:22px;
  fill:#fff;
}

/* =========================
   CONTENT
========================= */

.content{
  flex:1;
  overflow:auto;
  background:#1e1e1e;
  padding:30px 0;
  scroll-behavior:smooth;
}

.content::-webkit-scrollbar{
  width:12px;
}

.content::-webkit-scrollbar-track{
  background:#202124;
}

.content::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* =========================
   PAGE
========================= */

.page{
  width:100%;
  max-width:760px;
  aspect-ratio:9/16;
  background:#fff;
  margin:0 auto 30px;
  overflow:hidden;
  position:relative;
  transform-origin:top center;
  box-shadow:
  0 2px 10px rgba(0,0,0,.35),
  0 0 0 1px rgba(255,255,255,.04);
}

/* =========================
   SPLIT PAGE
========================= */

.split-page{
  display:flex;
  flex-direction:column;
  gap:0;
  padding:0;
  overflow:hidden;
  background:#fff;
}

.split-half{
  width:100%;
  height:50%;
  overflow:hidden;
}

.split-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}

/* =========================
   IMAGE
========================= */

img{
  width:100%;
  height:100%;
  display:block;
}

.full-bg,
.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}

/* ===================================
   MOBILE FIX
=================================== */

@media(max-width:768px){

  html,
  body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#1e1e1e;
  }

  .viewer{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ===== HIDE SIDEBAR ===== */

  .sidebar{
    display:none;
  }

  /* ===== MAIN ===== */

  .main{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ===== TOOLBAR ===== */

  .toolbar{
    width:100%;
    height:56px;
    min-height:56px;
    padding:0 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    flex-shrink:0;
  }

  /* ===== TITLE ===== */

  .toolbar-title{
    font-size:12px;
    max-width:110px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    flex-shrink:0;
  }

  /* ===== CENTER ZOOM ===== */

  .toolbar-center{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
  }

  #zoom-controls{
    display:flex;
    align-items:center;
    gap:4px;
  }

  #zoom-controls button{
    width:28px;
    height:28px;
    background:#3c4043;
    border-radius:4px;
    padding:0;
  }

  #zoom-controls svg{
    width:16px;
    height:16px;
  }

  #zoom-controls input{
    width:58px;
    height:28px;
    font-size:12px;
    border-radius:4px;
  }

  /* ===== PRINT ===== */

  .tool-btn{
    width:28px;
    height:28px;
    flex-shrink:0;
  }

  .tool-btn svg{
    width:18px;
    height:18px;
  }

  /* ===== CONTENT ===== */

  .content{
    flex:1;
    overflow:auto;
    padding:10px 0 40px;
    -webkit-overflow-scrolling:touch;
  }

  /* ===== PAGE ===== */

  .page{
    width:96%;
    max-width:none;
    margin:0 auto 14px;
    aspect-ratio:9/16;
    border-radius:4px;
    overflow:hidden;
    background:#fff;
  }

  /* ===== IMAGE ===== */

  .full-bg,
  .cover-image,
  .split-image{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center top;
    background:#fff;
  }

  /* ===== SPLIT ===== */

  .split-page{
    gap:0;
    padding:0;
  }

  .split-half{
    height:50%;
    overflow:hidden;
  }

}

</style>

</head>

<body>

<div class="viewer">

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

  <!-- thêm thumb ở đây -->

</div>

<!-- =========================
     MAIN
========================= -->

<div class="main">

<div class="toolbar">

<div class="toolbar-title">
THÉP TAM GIANG PROFILE
</div>

<div class="toolbar-center">

<span id="zoom-controls">

<button onclick="zoomOut()">
<svg viewBox="0 -960 960 960">
<path d="M232-444v-72h496v72H232Z"></path>
</svg>
</button>

<input
type="text"
id="zoomInput"
value="100%"
readonly>

<button onclick="zoomIn()">
<svg viewBox="0 -960 960 960">
<path d="M444-444H240v-72h204v-204h72v204h204v72H516v204h-72v-204Z"></path>
</svg>
</button>

</span>

</div>

<button class="tool-btn" onclick="window.print()">

<svg viewBox="0 -960 960 960">
<path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z"/>
</svg>

</button>

</div>

<!-- CONTENT -->

<div class="content" id="content">

<!-- thêm section page ở đây -->

</div>

</div>

</div>

<script>

let zoomLevel = 100;

function updateZoom(){

document.querySelectorAll('.page').forEach(page=>{

page.style.transform =
`scale(${zoomLevel / 100})`;

});

document.getElementById('zoomInput').value =
zoomLevel + '%';

}

function zoomIn(){

if(zoomLevel < 200){

zoomLevel += 10;
updateZoom();

}

}

function zoomOut(){

if(zoomLevel > 50){

zoomLevel -= 10;
updateZoom();

}

}

function scrollToPage(index){

const content =
document.getElementById('content');

const pages =
document.querySelectorAll('.page');

if(index === 12){

const page = pages[11];

content.scrollTo({

top: page.offsetTop,
behavior:'smooth'

});

return;

}

if(index === 13){

const page = pages[11];

content.scrollTo({

top:
page.offsetTop +
(page.offsetHeight / 2),

behavior:'smooth'

});

return;

}

if(index === 14){

const page = pages[12];

content.scrollTo({

top: page.offsetTop,
behavior:'smooth'

});

return;

}

if(index === 15){

const page = pages[12];

content.scrollTo({

top:
page.offsetTop +
(page.offsetHeight / 2),

behavior:'smooth'

});

return;

}

let realIndex = index;

if(index >= 16){

realIndex = index - 2;

}

const page =
pages[realIndex - 1];

if(page){

content.scrollTo({

top: page.offsetTop,
behavior:'smooth'

});

}

}

</script>

</body>
</html>
