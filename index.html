<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
  background:#e5e5e5;
  font-family:Arial,sans-serif;
}

/* PAGE */

.page{
  width:100%;
  max-width:720px;
  aspect-ratio:9 / 16;
  background:#fff;
  margin:20px auto;
  overflow:hidden;
  position:relative;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
  border-radius:0;
}

/* IMAGE */

img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  object-position:center center;
}

.full-bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* COVER FIX */

.cover-page{
  background:#ffffff;
}

.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#ffffff;
}

/* GRID */

.collage-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  height:100%;
}

/* CERTIFICATE */

.certificate-page{
  padding:20px;
  background:#f5f5f5;
}

.certificate-grid{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.certificate-item{
  background:#fff;
  overflow:hidden;
  border:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

.certificate-item img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

/* CERTIFICATE FULL */

.certificate-full-page{
  background:#f5f5f5;
  padding:20px;
}

.certificate-full-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  border:1px solid #ddd;
  overflow:hidden;
}

.certificate-full-wrap img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#ffffff;
}

/* PROJECT */

.project-layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  height:100%;
}

.main-project{
  overflow:hidden;
  height:100%;
}

.project-side-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  height:100%;
}

.sub-project{
  overflow:hidden;
}

.project-layout img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}

/* PARTNER */

.logo-grid-page{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:40px;
  align-content:center;
  width:100%;
  height:100%;
}

.logo-grid-page img{
  width:100%;
  height:120px;
  object-fit:contain;
  background:#fff;
  border:1px solid #ddd;
  padding:15px;
}

/* MOBILE */

@media(max-width:768px){

  .page{
    width:100%;
    margin:0 auto 15px;
  }

  .logo-grid-page{
    grid-template-columns:repeat(2,1fr);
  }

}

/* PRINT */

@media print{

  body{
    background:#fff;
  }

  .page{
    margin:0;
    max-width:none;
    width:1080px;
    height:1920px;
    aspect-ratio:auto;
    box-shadow:none;
  }

}

</style>
