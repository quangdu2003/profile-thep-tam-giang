<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THÉP TAM GIANG PROFILE</title>
    <link rel="icon" href="./profile-cover-removebg-preview.png">
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #202124; }
        .viewer { display: flex; width: 100%; height: 100vh; }

        /* ===== SIDEBAR ===== */
        .sidebar { width: 260px; background: #2b2b2b; overflow-y: auto; border-right: 1px solid #3c4043; padding: 14px 12px; }
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-thumb { background: #5f6368; border-radius: 4px; }

        .thumb { 
            width: 100%; 
            margin-bottom: 20px; 
            background: #202124; 
            border: 2px solid transparent; 
            padding: 5px; 
            cursor: pointer; 
            transition: .2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .thumb:hover { border-color: #8ab4f8; }
        
        /* Thumbnail dọc */
        .thumb img { width: 100%; height: auto; aspect-ratio: 1/1.414; object-fit: cover; background: #fff; }
        /* Thumbnail ngang cho trang 15 và 16 */
        .thumb.landscape img { aspect-ratio: 1.414/1; }
        
        .thumb span { display: block; text-align: center; color: #fff; margin-top: 8px; font-size: 13px; }

        /* ===== MAIN & TOOLBAR ===== */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { 
            height: 56px; 
            background: #2b2b2b; 
            border-bottom: 1px solid #3c4043; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 18px; 
            position: relative; 
            z-index: 100; 
        }
        .toolbar-title { color: #fff; font-size: 16px; font-weight: 600; }
        .toolbar-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; }
        
        #zoom-controls { display: flex; align-items: center; gap: 8px; }
        #zoom-controls button { width: 32px; height: 32px; border: none; background: transparent; color: #fff; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        #zoom-controls button:hover { background: #3c4043; }
        #zoom-controls input { width: 60px; height: 28px; background: #202124; border: 1px solid #5f6368; color: #fff; text-align: center; font-size: 13px; outline: none; }
        
        .toolbar-right { display: flex; align-items: center; gap: 12px; }
        .tool-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: .2s; cursor: pointer; border: none; background: transparent; }
        .tool-btn:hover { background: #3c4043; }
        .tool-btn svg { width: 20px; height: 20px; fill: #fff; }

        /* ===== CONTENT & PAGE ===== */
        .content { flex: 1; overflow-x: hidden; overflow-y: auto; background: #1e1e1e; padding: 30px 0; scroll-behavior: smooth; }
        .page { width: 100%; max-width: 760px; aspect-ratio: 1/1.414; background: #fff; margin: 0 auto 30px; overflow: hidden; transform-origin: top center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .split-page { display: flex; flex-direction: column; }
        .split-half { width: 100%; height: 50%; overflow: hidden; }
        
        img { width: 100%; height: 100%; display: block; object-fit: contain; }
        .split-half img { object-fit: cover; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            .sidebar, .toolbar { display: none !important; }
            .viewer, .main, .content { display: block !important; padding: 0 !important; }
            .page { width: 210mm !important; height: 297mm !important; margin: 0 !important; page-break-after: always !important; transform: scale(1) !important; box-shadow: none !important; }
        }
    </style>
</head>

<body>
    <div class="viewer">
        <div class="sidebar">
            <!-- 14 trang dọc đầu tiên -->
            <div class="thumb" onclick="scrollToPage(1)"><img src="./profile-cover.jpg"><span>1</span></div>
            <div class="thumb" onclick="scrollToPage(2)"><img src="./company-intro-01.jpg"><span>2</span></div>
            <div class="thumb" onclick="scrollToPage(3)"><img src="./company-intro-02.jpg"><span>3</span></div>
            <div class="thumb" onclick="scrollToPage(4)"><img src="./main-products.jpg"><span>4</span></div>
            <div class="thumb" onclick="scrollToPage(5)"><img src="./thep-products.jpg"><span>5</span></div>
            <div class="thumb" onclick="scrollToPage(6)"><img src="./ximang-products.jpg"><span>6</span></div>
            <div class="thumb" onclick="scrollToPage(7)"><img src="./thephinh-products.jpg"><span>7</span></div>
            <div class="thumb" onclick="scrollToPage(8)"><img src="./vlxd-products.jpg"><span>8</span></div>
            <div class="thumb" onclick="scrollToPage(9)"><img src="./project-01.jpg"><span>9</span></div>
            <div class="thumb" onclick="scrollToPage(10)"><img src="./project-02.jpg"><span>10</span></div>
            <div class="thumb" onclick="scrollToPage(11)"><img src="./project-03.jpg"><span>11</span></div>
            <div class="thumb" onclick="scrollToPage(12)"><img src="./project-08.jpg"><span>12</span></div>
            <div class="thumb" onclick="scrollToPage(13)"><img src="./project-09.jpg"><span>13</span></div>
            <div class="thumb" onclick="scrollToPage(14)"><img src="./project-10.jpg"><span>14</span></div>

            <!-- Trang ghép 15 (Chứa ô 15 & 16 bên trái) -->
            <div class="thumb landscape" onclick="scrollToPage(15)"><img src="./project-04.jpg"><span>15</span></div>
            <div class="thumb landscape" onclick="scrollToPage(16)"><img src="./project-07.jpg"><span>16</span></div>

            <!-- Các trang dọc còn lại -->
            <div class="thumb" onclick="scrollToPage(17)"><img src="./project-11.jpg"><span>17</span></div>
            <div class="thumb" onclick="scrollToPage(18)"><img src="./project-12.jpg"><span>18</span></div>
        </div>

        <div class="main">
            <div class="toolbar">
                <div class="toolbar-title">THÉP TAM GIANG PROFILE</div>
                <div class="toolbar-center">
                    <div id="zoom-controls">
                        <button onclick="zoomOut()"><svg viewBox="0 -960 960 960"><path d="M232-444v-72h496v72H232Z"/></svg></button>
                        <input type="text" id="zoomInput" value="100%" readonly>
                        <button onclick="zoomIn()"><svg viewBox="0 -960 960 960"><path d="M444-444H240v-72h204v-204h72v204h204v72H516v204h-72v-204Z"/></svg></button>
                    </div>
                </div>
                <div class="toolbar-right">
                    <a href="https://drive.google.com/uc?export=download&id=1-CbOZUOEgPujQ9oRuHAX8_ACFzOTI5JP" class="tool-btn" title="Tải xuống">
                        <svg viewBox="0 -960 960 960"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
                    </a>
                    <button class="tool-btn" onclick="window.print()" title="In">
                        <svg viewBox="0 -960 960 960"><path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z"/></svg>
                    </button>
                </div>
            </div>

            <div class="content" id="content">
                <!-- 14 trang dọc -->
                <section class="page"><img src="./profile-cover.jpg"></section>
                <section class="page"><img src="./company-intro-01.jpg"></section>
                <section class="page"><img src="./company-intro-02.jpg"></section>
                <section class="page"><img src="./main-products.jpg"></section>
                <section class="page"><img src="./thep-products.jpg"></section>
                <section class="page"><img src="./ximang-products.jpg"></section>
                <section class="page"><img src="./thephinh-products.jpg"></section>
                <section class="page"><img src="./vlxd-products.jpg"></section>
                <section class="page"><img src="./project-11.jpg"></section>
                <section class="page"><img src="./project-12.jpg"></section>
                <section class="page"><img src="./project-03.jpg"></section>
                <section class="page"><img src="./project-08.jpg"></section>
                <section class="page"><img src="./project-09.jpg"></section>
                <section class="page"><img src="./project-10.jpg"></section>

                <!-- TRANG GỘP 15 (Chia đôi) -->
                <section class="page split-page">
                    <div class="split-half"><img src="./project-04.jpg"></div>
                    <div class="split-half"><img src="./project-07.jpg"></div>
                </section>

                <!-- 2 trang dọc cuối -->
                <section class="page"><img src="./project-01.jpg"></section>
                <section class="page"><img src="./project-02.jpg"></section>
            </div>
        </div>
    </div>

    <script>
        let zoomLevel = 100;
        const content = document.getElementById('content');
        
        function updateZoom() {
            document.querySelectorAll('.page').forEach(page => {
                page.style.transform = `scale(${zoomLevel / 100})`;
            });
            document.getElementById('zoomInput').value = zoomLevel + '%';
        }
        function zoomIn() { if (zoomLevel < 180) { zoomLevel += 10; updateZoom(); } }
        function zoomOut() { if (zoomLevel > 50) { zoomLevel -= 10; updateZoom(); } }

        function scrollToPage(index) {
            const pages = document.querySelectorAll('.page');
            let targetTop = 0;

            if (index <= 14) {
                targetTop = pages[index - 1].offsetTop;
            } else if (index === 15) {
                targetTop = pages[14].offsetTop; // Đầu trang ghép
            } else if (index === 16) {
                targetTop = pages[14].offsetTop + (pages[14].offsetHeight / 2); // Giữa trang ghép
            } else {
                targetTop = pages[index - 2].offsetTop; // Trang 17, 18 tương ứng section 15, 16
            }

            content.scrollTo({ top: targetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
