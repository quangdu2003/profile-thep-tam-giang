<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>THÉP TAM GIANG PROFILE</title>
<link rel="icon" href="./profile-cover-removebg-preview.png">
<style>
/* ═══ RESET ══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#202124;
}

/* ═══ LAYOUT ══════════════════════════════════════════════════════════ */
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ══════════════════════════════════════════════════════════ */
.sidebar {
    width:200px;
    background:#2b2b2b;
    overflow-y:auto;
    overflow-x:hidden;
    border-right:1px solid #3c4043;
    padding:12px 8px;
    display:flex;
    flex-direction:column;
    height:100vh;
    flex-shrink:0;
}
.thumb {
    width:100%;
    margin-bottom:14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.thumb-inner {
    width:100%;
    aspect-ratio:210/297;
    background:#fff;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}
.thumb-inner img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
/* Thumb split: 2 ảnh xếp dọc, không kéo giãn, có khoảng tách */
.thumb-inner.split {
    flex-direction:column;
    align-items:stretch;
    justify-content:flex-start;
    padding:3px;
    gap:3px;
    background:#c8c8c8;
}
.thumb-inner.split .th-half {
    flex:1;
    min-height:0;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
}
.thumb-inner.split .th-half img {
    max-width:100%; max-height:100%;
    object-fit:contain;
}
.thumb span {
    display:block;
    text-align:center;
    color:#bbb;
    margin-top:4px;
    font-size:12px;
}
.thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

/* ═══ MAIN ════════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR DESKTOP ════════════════════════════════════════════════ */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 14px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    justify-self:start;
}
.toolbar-center {
    display:flex;
    align-items:center;
    justify-content:center;
}
.zoom-btn {
    width:32px; height:32px;
    border:none;
    background:#3c4043;
    color:#fff;
    cursor:pointer;
    border-radius:4px;
    font-size:22px;
    font-weight:300;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    flex-shrink:0;
}
.zoom-btn:hover { background:#5f6368; }
.zoom-val {
    width:60px; height:28px;
    background:#202124;
    border:1px solid #5f6368;
    color:#fff;
    text-align:center;
    font-size:13px;
    outline:none;
    border-radius:3px;
    cursor:default;
    margin:0 4px;
}
.toolbar-right {
    display:flex;
    align-items:center;
    gap:8px;
    justify-self:end;
}
.tool-btn {
    width:34px; height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background:#3c4043;
    cursor:pointer;
    border:none;
    text-decoration:none;
    flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT ════════════════════════════════════════════════════════ */
.content {
    flex:1;
    overflow-x:hidden;
    overflow-y:auto;
    padding:24px 0;
    scroll-behavior:smooth;
}

/* ─── TRANG ĐƠN ─── */
.page {
    width:794px;
    height:1123px;
    background:#fff;
    margin:0 auto 24px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
    position:relative;
    flex-shrink:0;
}
.page > img {
    width:100%; height:100%;
    display:block;
    object-fit:fill;
}

/* ─── TRANG SPLIT: 1 trang A4 chứa 2 ảnh xếp dọc ─── */
/* object-fit:contain → ảnh KHÔNG bị kéo giãn, dư trắng thì dư  */
/* Khoảng tách giữa = 20px nền xám để phân biệt rõ 2 ảnh         */
.split-page {
    background:#d0d0d0 !important;
    display:flex !important;
    flex-direction:column !important;
    padding:16px !important;
    gap:0 !important;
}
.split-half {
    flex:1;
    min-height:0;
    overflow:hidden;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
}
.split-half img {
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
}
.split-gap {
    height:20px;
    flex-shrink:0;
    background:#d0d0d0;
}

/* ═══ MOBILE TOOLBAR ══════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }

    .toolbar {
        height:auto;
        display:flex;
        flex-direction:column;
        align-items:stretch;
        padding:8px 10px;
        gap:0;
        grid-template-columns:unset;
    }
    .toolbar-title {
        width:100%;
        text-align:center;
        font-size:13px;
        padding-bottom:8px;
        border-bottom:1px solid #3c4043;
        justify-self:unset;
        white-space:nowrap;
    }
    .toolbar-center,
    .toolbar-right { display:none !important; }

    .zoom-btn { width:38px; height:38px; font-size:26px; }
    .zoom-val  { width:54px; height:32px; font-size:13px; }
    .tool-btn  { width:38px; height:38px; }

    .page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
    .split-page {
        padding:8px !important;
    }
    .split-gap { height:10px; }
}

/* ═══ PRINT DESKTOP ═══════════════════════════════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    .sidebar, .toolbar, #toolbar-row2, #print-overlay { display:none !important; }
    html, body {
        background:white !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important;
        padding:0 !important; margin:0 !important;
    }
    .page {
        display:block !important;
        width:210mm !important;
        height:297mm !important; min-height:297mm !important; max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important; transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
    }
    .page:last-child { page-break-after:avoid !important; break-after:avoid !important; }
    .page > img { width:210mm !important; height:297mm !important; object-fit:fill !important; display:block !important; }
    /* split print */
    .split-page {
        background:#d0d0d0 !important;
        display:flex !important; flex-direction:column !important;
        width:210mm !important; height:297mm !important;
        padding:8mm !important; gap:0 !important;
    }
    .split-half {
        flex:1 !important; background:#fff !important;
        display:flex !important; align-items:center !important; justify-content:center !important;
        overflow:hidden !important;
    }
    .split-half img { max-width:100% !important; max-height:100% !important; object-fit:contain !important; display:block !important; }
    .split-gap { height:8mm !important; background:#d0d0d0 !important; flex-shrink:0 !important; }
}

/* ═══ OVERLAY ════════════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; font-size:15px;
}
#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,.2); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<script>
/* ─── Layout switch ─── */
function applyLayout() {
    const mob = window.innerWidth <= 768;
    document.getElementById('toolbar-row2').style.display = mob ? 'block' : 'none';
    document.getElementById('zoom-d').style.display  = mob ? 'none' : 'flex';
    document.getElementById('icons-d').style.display = mob ? 'none' : 'flex';
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ─── Zoom ─── */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel/100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff/2}px`;
        p.style.marginBottom = `${24 - diff/2}px`;
    });
    document.getElementById('zoom-display').value   = zoomLevel + '%';
    document.getElementById('zoom-display-m').value = zoomLevel + '%';
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }
function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.getElementById('zoom-display').value   = '100%';
    document.getElementById('zoom-display-m').value = '100%';
}
function scrollToPage(i) {
    const el = document.getElementById('p'+i);
    if (el) contentEl.scrollTo({top: el.offsetTop - 16, behavior:'smooth'});
}

/* ─── Browser detect ─── */
const ua = navigator.userAgent;
const isIOS           = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS     = /CriOS/i.test(ua);
const isSafariIOS     = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS/i.test(ua);
const isAndroid       = /Android/i.test(ua);
const isChromeAndroid = isAndroid && /Chrome/i.test(ua) && !/Firefox/i.test(ua);
const needsIframe     = isChromeIOS || isChromeAndroid;

/* ─── PAGES list (17 trang) ─── */
const PAGES = [
    {t:'s', src:'./profile-cover.jpg'},
    {t:'s', src:'./company-intro-01.jpg'},
    {t:'s', src:'./company-intro-02.jpg'},
    {t:'s', src:'./main-products.jpg'},
    {t:'s', src:'./thep-products.jpg'},
    {t:'s', src:'./ximang-products.jpg'},
    {t:'s', src:'./thephinh-products.jpg'},
    {t:'s', src:'./vlxd-products.jpg'},
    {t:'s', src:'./project-11.jpg'},
    {t:'s', src:'./project-12.jpg'},
    {t:'s', src:'./project-03.jpg'},
    {t:'s', src:'./project-08.jpg'},
    {t:'s', src:'./project-09.jpg'},
    {t:'s', src:'./project-10.jpg'},
    {t:'2', src:'./project-04.jpg', src2:'./project-07.jpg'},
    {t:'s', src:'./project-01.jpg'},
    {t:'s', src:'./project-02.jpg'},
];

function getBase() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/')+1);
}

/* ─── IFRAME PRINT (Chrome iOS/Android) ─────────────────────────────
   Build document sạch: chỉ có ảnh, không toolbar, không sidebar.
   → Đúng 17 trang khi in.
   Quan trọng: iframe.width=794px để Chrome không thu hẹp layout.
────────────────────────────────────────────────────────────────────── */
function buildIframeHTML() {
    const base = getBase();
    const W = 794, H = 1123;
    const PAD = 16, GAP = 20;
    const halfH = Math.floor((H - PAD*2 - GAP) / 2);
    const abs = r => base + r.replace(/^\.\//, '');

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
@page{size:210mm 297mm;margin:0}
html,body{width:${W}px;margin:0;padding:0;background:#fff}
.p{width:${W}px;height:${H}px;overflow:hidden;background:#fff;
   page-break-after:always;break-after:page;
   page-break-inside:avoid;break-inside:avoid}
.p:last-child{page-break-after:avoid;break-after:avoid}
.p>img{display:block;width:${W}px;height:${H}px;object-fit:fill}
.sp{display:flex;flex-direction:column;background:#d0d0d0;padding:${PAD}px}
.sh{width:${W-PAD*2}px;height:${halfH}px;background:#fff;
    display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.sh img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.sg{height:${GAP}px;flex-shrink:0;background:#d0d0d0}
</style></head><body>`;

    PAGES.forEach(p => {
        if (p.t === '2') {
            html += `<div class="p sp">`
                  + `<div class="sh"><img src="${abs(p.src)}"></div>`
                  + `<div class="sg"></div>`
                  + `<div class="sh"><img src="${abs(p.src2)}"></div>`
                  + `</div>`;
        } else {
            html += `<div class="p"><img src="${abs(p.src)}"></div>`;
        }
    });
    return html + `</body></html>`;
}

function printViaIframe() {
    const msgEl = document.getElementById('overlay-msg');
    msgEl.textContent = 'Đang tải ảnh để in…';
    const old = document.getElementById('_pf');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id = '_pf';
    /* width=794px để Chrome render đúng A4, đặt ngoài màn hình */
    iframe.style.cssText = 'position:fixed;top:-9999px;left:0;width:794px;height:1px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(buildIframeHTML()); doc.close();

    function waitImgs(cb) {
        const imgs = Array.from(doc.querySelectorAll('img'));
        let n = imgs.filter(i => !i.complete).length;
        if (!n) return cb();
        imgs.forEach(img => {
            if (!img.complete) {
                const fn = () => { if (!--n) cb(); };
                img.addEventListener('load',  fn, {once:true});
                img.addEventListener('error', fn, {once:true});
            }
        });
    }

    waitImgs(() => {
        msgEl.textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            document.getElementById('print-overlay').classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => iframe.remove(), 15000);
            }, 400);
        }, 400);
    });
}

/* ─── SAFARI iOS PRINT ───────────────────────────────────────────────
   Inject @media print CSS vào document.
   Tính kích thước theo portrait screen width.
   Ẩn toàn bộ UI, chỉ render .page trong .content.
────────────────────────────────────────────────────────────────────── */
let _safariStyleEl = null;
function buildSafariCSS() {
    const pw  = Math.min(screen.width, screen.height); // portrait px
    const ph  = Math.round(pw * 297 / 210);
    const pad = Math.round(pw * 0.02);
    const gap = Math.round(pw * 0.025);
    const halfH = Math.floor((ph - pad*2 - gap) / 2);

    return `@media print{
@page{size:${pw}px ${ph}px;margin:0!important}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
#print-overlay,.sidebar,.toolbar,#toolbar-row2{display:none!important}
html,body{background:#fff!important;width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;overflow:visible!important}
.viewer,.main,.content{display:block!important;width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;overflow:visible!important;background:#fff!important}
.page{display:block!important;width:${pw}px!important;
  height:${ph}px!important;min-height:${ph}px!important;max-height:${ph}px!important;
  margin:0!important;padding:0!important;border:none!important;box-shadow:none!important;
  overflow:hidden!important;background:#fff!important;transform:none!important;
  page-break-after:always!important;break-after:page!important;
  page-break-inside:avoid!important;break-inside:avoid!important}
.page:last-child{page-break-after:avoid!important;break-after:avoid!important}
.page>img{width:${pw}px!important;height:${ph}px!important;object-fit:fill!important;display:block!important}
.split-page{display:flex!important;flex-direction:column!important;
  width:${pw}px!important;height:${ph}px!important;
  background:#d0d0d0!important;padding:${pad}px!important;gap:0!important;overflow:hidden!important}
.split-half{flex:none!important;width:${pw-pad*2}px!important;height:${halfH}px!important;
  background:#fff!important;display:flex!important;align-items:center!important;
  justify-content:center!important;overflow:hidden!important}
.split-half img{max-width:100%!important;max-height:100%!important;object-fit:contain!important;display:block!important}
.split-gap{height:${gap}px!important;flex-shrink:0!important;background:#d0d0d0!important;display:block!important}
}`;
}
function injectSafariCSS() {
    if (_safariStyleEl) _safariStyleEl.remove();
    _safariStyleEl = document.createElement('style');
    _safariStyleEl.textContent = buildSafariCSS();
    document.head.appendChild(_safariStyleEl);
}

/* ─── Wait images ─── */
function waitMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let n = imgs.filter(i => !i.complete).length;
    if (!n) return cb();
    imgs.forEach(img => {
        if (!img.complete) {
            const fn = () => { if (!--n) cb(); };
            img.addEventListener('load',  fn, {once:true});
            img.addEventListener('error', fn, {once:true});
        }
    });
}

/* ─── printProfile ─── */
function printProfile() {
    const overlay = document.getElementById('print-overlay');
    resetZoom();
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (needsIframe) {
        printViaIframe();
    } else if (isSafariIOS) {
        injectSafariCSS();
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 500);
            }, 700);
        });
    } else {
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

window.addEventListener('beforeprint', () => {
    resetZoom();
    if (isSafariIOS) injectSafariCSS();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
