<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THÉP TAM GIANG PROFILE</title>

<link rel="icon" href="./profile-cover-removebg-preview.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#1e1e1e;
}

/* ===== PDF VIEWER STYLE ===== */

.viewer{
  display:flex;
  width:100%;
  height:100vh;
}

/* LEFT SIDEBAR */

.sidebar{
  width:230px;
  background:#202124;
  overflow-y:auto;
  padding:15px 10px;
  border-right:1px solid #333;
}

.thumb{
  width:100%;
  margin-bottom:18px;
  background:#2b2b2b;
  padding:6px;
  cursor:pointer;
  transition:.2s;
}

.thumb:hover{
  background:#3a3a3a;
}

.thumb img{
  width:100%;
  display:block;
}

.thumb span{
  display:block;
  text-align:center;
  color:#fff;
  margin-top:8px;
  font-size:14px;
}

/* MAIN */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOPBAR */

.toolbar{
  height:60px;
  background:#202124;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid #333;
}

.toolbar-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.toolbar-title{
  color:#fff;
  font-size:18px;
  font-weight:bold;
}

.toolbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* BUTTON */

.tool-btn{
  width:38px;
  height:38px;
  border:none;
  background:#2f3033;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  transition:.2s;
}

.tool-btn:hover{
  background:#3d3e42;
}

.zoom-text{
  color:#fff;
  min-width:60px;
  text-align:center;
  font-size:15px;
}

/* CONTENT */

.content{
  flex:1;
  overflow:auto;
  padding:30px;
  background:#2b2b2b;
}

/* PAGE */

.page{
  width:100%;
  max-width:720px;
  aspect-ratio:9/16;
  background:#fff;
  margin:0 auto 30px;
  overflow:hidden;
  position:relative;
  transform-origin:top center;
  box-shadow:0 5px 20px rgba(0,0,0,.4);
}

/* IMAGE */

img{
  width:100%;
  height:100%;
  display:block;
}

/* FULL IMAGE */

.full-bg,
.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}

/* CERTIFICATE */

.certificate-page{
  padding:20px;
  background:#f5f5f5;
}

.certificate-grid{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.certificate-item{
  background:#fff;
  border:1px solid #ddd;
  overflow:hidden;
}

.certificate-item img{
  object-fit:contain;
  background:#fff;
}

.certificate-full-page{
  background:#f5f5f5;
  padding:20px;
}

.certificate-full-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid #ddd;
}

.certificate-full-wrap img{
  object-fit:contain;
  background:#fff;
}

/* COLLAGE */

.collage-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  height:100%;
}

.collage-grid img{
  object-fit:cover;
}

/* MOBILE */

@media(max-width:768px){

  .sidebar{
    display:none;
  }

  .toolbar-title{
    font-size:15px;
  }

  .content{
    padding:10px;
  }

}

</style>

</head>

<body>

<div class="viewer">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="thumb" onclick="scrollToPage(1)">
      <img src="./profile-cover.jpg">
      <span>1</span>
    </div>

    <div class="thumb" onclick="scrollToPage(2)">
      <img src="./company-intro-01.jpg">
      <span>2</span>
    </div>

    <div class="thumb" onclick="scrollToPage(3)">
      <img src="./company-intro-02.jpg">
      <span>3</span>
    </div>

    <div class="thumb" onclick="scrollToPage(4)">
      <img src="./main-products.jpg">
      <span>4</span>
    </div>

    <div class="thumb" onclick="scrollToPage(5)">
      <img src="./project-01.jpg">
      <span>5</span>
    </div>

    <div class="thumb" onclick="scrollToPage(6)">
      <img src="./project-02.jpg">
      <span>6</span>
    </div>

    <div class="thumb" onclick="scrollToPage(7)">
      <img src="./project-03.jpg">
      <span>7</span>
    </div>

    <div class="thumb" onclick="scrollToPage(8)">
      <img src="./project-04.jpg">
      <span>8</span>
    </div>

    <div class="thumb" onclick="scrollToPage(9)">
      <img src="./project-05.jpg">
      <span>9</span>
    </div>

    <div class="thumb" onclick="scrollToPage(10)">
      <img src="./project-06.jpg">
      <span>10</span>
    </div>

    <div class="thumb" onclick="scrollToPage(11)">
      <img src="./project-11.jpg">
      <span>11</span>
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <!-- TOOLBAR -->

    <div class="toolbar">

      <div class="toolbar-left">
        <div class="toolbar-title">
          THÉP TAM GIANG PROFILE
        </div>
      </div>

      <div class="toolbar-right">

        <button class="tool-btn" onclick="zoomOut()">
          -
        </button>

        <div class="zoom-text" id="zoomText">
          100%
        </div>

        <button class="tool-btn" onclick="zoomIn()">
          +
        </button>

      </div>

    </div>

    <!-- CONTENT -->

    <div class="content" id="content">

      <!-- 01 COVER -->
      <section class="page">
        <img loading="lazy" class="cover-image" src="./profile-cover.jpg">
      </section>

      <!-- 02 INTRO -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./company-intro-01.jpg">
      </section>

      <!-- 03 INTRO -->
      <section class="page">

      <!-- 04 MAIN PRODUCTS -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./main-products.jpg">
      </section>

      <!-- 05 PROJECT -->
      <section class="page">

      </section>

      <!-- 06 PROJECT -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./project-02.jpg">
      </section>

      <!-- 07 PROJECT -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./project-03.jpg">
      </section>

      <!-- 08 PROJECT -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./project-04.jpg">
      </section>

      <!-- 09 PROJECT -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./project-05.jpg">
      </section>

      <!-- 10 PROJECT -->
      <section class="page">
        <img loading="lazy" class="full-bg" src="./project-06.jpg">
      </section>

    </div>

  </div>

</div>

<script>

let zoomLevel = 100;

function updateZoom(){

  document.querySelectorAll('.page').forEach(page=>{

    page.style.transform = `scale(${zoomLevel / 100})`;

  });

  document.getElementById('zoomText').innerText = zoomLevel + '%';

}

function zoomIn(){

  if(zoomLevel < 200){

    zoomLevel += 10;
    updateZoom();

  }

}

function zoomOut(){

  if(zoomLevel > 50){

    zoomLevel -= 10;
    updateZoom();

  }

}

function scrollToPage(index){

  const pages = document.querySelectorAll('.page');

  if(pages[index - 1]){

    pages[index - 1].scrollIntoView({

      behavior:'smooth'

    });

  }

}

</script>

</body>
</html>
