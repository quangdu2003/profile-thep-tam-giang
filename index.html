<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>THÉP TAM GIANG PROFILE - In Ấn Chính Xác</title>
<link rel="icon" href="./profile-cover-removebg-preview.png">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:#202124;
}
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR (Desktop) ══════════════════════════════════════════════ */
.sidebar {
    width:200px;
    background:#2b2b2b;
    overflow-y:auto;
    overflow-x:hidden;
    border-right:1px solid #3c4043;
    padding:12px 8px;
    display:flex;
    flex-direction:column;
    height:100vh;
    flex-shrink:0;
}
.thumb {
    width:100%;
    margin-bottom:14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.thumb-inner {
    width:100%;
    aspect-ratio:210/297;
    background:#fff;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* MẶC ĐỊNH: tất cả thumb đều dùng contain (giữ tỷ lệ) */
.thumb-inner img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
/* CHỈ desktop: thumb 15 & 16 (nửa trang) dùng cover chiều rộng, dư chiều cao cắt đi (fit theo chiều rộng, overflow top/bottom) */
@media (min-width: 769px) {
    .thumb-inner.fit-width img {
        width:100%;
        height:100%;
        object-fit:cover;
        object-position:center top;
    }
}
/* mobile giữ nguyên contain để dễ nhìn */
@media (max-width: 768px) {
    .thumb-inner.fit-width img {
        object-fit:contain;
    }
}
.thumb span {
    display:block;
    text-align:center;
    color:#bbb;
    margin-top:4px;
    font-size:12px;
}
.thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

/* ═══ MAIN ═══════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* TOOLBAR */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 14px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff; font-size:14px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; justify-self:start;
}
.toolbar-center { display:flex; align-items:center; justify-content:center; }
.zoom-btn {
    width:32px; height:32px; border:none; background:#3c4043; color:#fff;
    cursor:pointer; border-radius:4px; font-size:22px; font-weight:300;
    display:flex; align-items:center; justify-content:center; user-select:none; flex-shrink:0;
}
.zoom-btn:hover { background:#5f6368; }
.zoom-val {
    width:60px; height:28px; background:#202124; border:1px solid #5f6368; color:#fff;
    text-align:center; font-size:13px; outline:none; border-radius:3px; cursor:default; margin:0 4px;
}
.toolbar-right { display:flex; align-items:center; gap:8px; justify-self:end; }
.tool-btn {
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; background:#3c4043; cursor:pointer; border:none; text-decoration:none; flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* CONTENT (VIEW) */
.content {
    flex:1; overflow-x:hidden; overflow-y:auto; padding:24px 0; scroll-behavior:smooth;
}
/* chuẩn A4 794x1123px (dự phòng) */
.page {
    width:794px; height:1123px; background:#fff;
    margin:0 auto 24px; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.6); position:relative; flex-shrink:0;
}
.page > img { width:100%; height:100%; display:block; object-fit:fill; }

/* Split page: 2 ảnh xếp dọc */
.split-page {
    background:#d0d0d0 !important;
    display:flex !important; flex-direction:column !important;
    padding:16px !important; gap:0 !important;
}
.split-half {
    flex:1; min-height:0; overflow:hidden; background:#fff;
    display:flex; align-items:center; justify-content:center;
}
.split-half img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
.split-gap { height:20px; flex-shrink:0; background:#d0d0d0; }

/* MOBILE RESPONSIVE */
@media (max-width:768px) {
    .sidebar { display:none; }
    .toolbar {
        height:auto; display:flex; flex-direction:column;
        align-items:stretch; padding:8px 10px; gap:0; grid-template-columns:unset;
    }
    .toolbar-title {
        width:100%; text-align:center; font-size:13px;
        padding-bottom:8px; border-bottom:1px solid #3c4043; justify-self:unset;
    }
    .toolbar-center, .toolbar-right { display:none !important; }
    .page { width:95vw !important; height:auto !important; aspect-ratio:210/297; }
    .split-page { padding:8px !important; }
    .split-gap { height:10px; }
}

/* ═══ IN ẤN GỐC (Desktop + Safari iOS) CHÍNH XÁC 1 TRANG / 1 A4 ═════ */
@media print {
    @page { 
        size: A4 portrait; 
        margin: 0mm !important; 
    }
    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }
    /* Ẩn giao diện phụ */
    .sidebar, .toolbar, #toolbar-row2, #print-overlay, .toolbar-right, .toolbar-center {
        display: none !important;
    }
    html, body {
        background: white !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
    }
    .viewer, .main, .content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
        transform: none !important;
    }
    /* Mỗi trang A4 chiếm đúng 1 page break */
    .page {
        display: block !important;
        width: 100% !important;
        height: 297mm !important;
        min-height: 297mm !important;
        max-height: 297mm !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        box-shadow: none !important;
        overflow: hidden !important;
        background: white !important;
        transform: none !important;
        page-break-after: always !important;
        break-after: page !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
    }
    .page:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
    }
    /* Ảnh đơn full */
    .page > img {
        width: 100% !important;
        height: 297mm !important;
        object-fit: fill !important;
        display: block !important;
    }
    /* Split page dạng 2 ảnh dọc trong 1 A4 */
    .split-page {
        display: flex !important;
        flex-direction: column !important;
        width: 100% !important;
        height: 297mm !important;
        background: #d0d0d0 !important;
        padding: 8mm !important;
        gap: 0 !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
    }
    .split-half {
        flex: 1 !important;
        background: #fff !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: hidden !important;
    }
    .split-half img {
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain !important;
        display: block !important;
    }
    .split-gap {
        height: 5mm !important;
        flex-shrink: 0 !important;
        background: #d0d0d0 !important;
        display: block !important;
    }
}

/* ═══ OVERLAY TẢI ẢNH ════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; font-size:15px;
}
#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,.2); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>

<script>
/* ── Layout switch (Mobile / Desktop) ─────────────────────────────── */
function applyLayout() {
    const mob = window.innerWidth <= 768;
    document.getElementById('toolbar-row2').style.display = mob ? 'block' : 'none';
    document.getElementById('zoom-d').style.display  = mob ? 'none' : 'flex';
    document.getElementById('icons-d').style.display = mob ? 'none' : 'flex';
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ── Zoom ──────────────────────────────────────────────────────────── */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel/100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff/2}px`;
        p.style.marginBottom = `${24 - diff/2}px`;
    });
    document.getElementById('zoom-display').value   = zoomLevel + '%';
    document.getElementById('zoom-display-m').value = zoomLevel + '%';
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }
function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.getElementById('zoom-display').value   = '100%';
    document.getElementById('zoom-display-m').value = '100%';
}

/* Scroll */
function scrollToPage(i) {
    const el = document.getElementById('p' + i);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior: 'smooth' });
}
function scrollToSplitHalf(half) {
    const page = document.getElementById('p14');
    if (!page) return;
    if (half === 'top') {
        contentEl.scrollTo({ top: page.offsetTop - 16, behavior: 'smooth' });
    } else {
        const botEl = document.getElementById('split-bot');
        if (botEl) {
            contentEl.scrollTo({ top: page.offsetTop + botEl.offsetTop - 16, behavior: 'smooth' });
        }
    }
}

/* ── Browser detection & in ấn chuyên biệt ───────────────────────── */
const ua = navigator.userAgent;
const isIOS = /iP(hone|ad|od)/i.test(ua);
const isChromeAndroid = /Android/i.test(ua) && /Chrome/i.test(ua) && !/Firefox/i.test(ua);
const isSafariIOS = isIOS && /Safari/i.test(ua) && !/CriOS|FxiOS|EdgiOS/i.test(ua);

/* Dữ liệu 17 trang (cho iframe fallback) */
const PAGES_DATA = [
    { t:'s', src:'./profile-cover.jpg' },{ t:'s', src:'./company-intro-01.jpg' },{ t:'s', src:'./company-intro-02.jpg' },
    { t:'s', src:'./main-products.jpg' },{ t:'s', src:'./thep-products.jpg' },{ t:'s', src:'./ximang-products.jpg' },
    { t:'s', src:'./thephinh-products.jpg' },{ t:'s', src:'./vlxd-products.jpg' },{ t:'s', src:'./project-11.jpg' },
    { t:'s', src:'./project-12.jpg' },{ t:'s', src:'./project-03.jpg' },{ t:'s', src:'./project-08.jpg' },
    { t:'s', src:'./project-09.jpg' },{ t:'s', src:'./project-10.jpg' },{ t:'2', src:'./project-04.jpg', src2:'./project-07.jpg' },
    { t:'s', src:'./project-01.jpg' },{ t:'s', src:'./project-02.jpg' }
];

function getAbsolutePath(rel) {
    const base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    return base + rel.replace(/^\.\//, '');
}

/* Chrome Android: iframe riêng với CSS in chính xác (tránh in 2 trang lẻ) */
function buildIframeHTML() {
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Print Profile</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    @page{size:A4 portrait; margin:0mm;}
    body{background:#fff; width:100%;}
    .print-page{width:210mm; height:297mm; page-break-after:always; break-after:page; page-break-inside:avoid; overflow:hidden; background:#fff; margin:0;}
    .print-page:last-child{page-break-after:auto;}
    .print-page img{width:100%; height:100%; object-fit:fill; display:block;}
    .split-print{display:flex; flex-direction:column; background:#d0d0d0; padding:8mm;}
    .split-print .half{flex:1; background:#fff; display:flex; align-items:center; justify-content:center; margin:0; overflow:hidden;}
    .split-print .half img{max-width:100%; max-height:100%; object-fit:contain;}
    .gap-split{height:5mm; background:#d0d0d0;}
    </style>
    </head><body>`;
    PAGES_DATA.forEach(p => {
        if(p.t === '2') {
            html += `<div class="print-page split-print"><div class="half"><img src="${getAbsolutePath(p.src)}"></div><div class="gap-split"></div><div class="half"><img src="${getAbsolutePath(p.src2)}"></div></div>`;
        } else {
            html += `<div class="print-page"><img src="${getAbsolutePath(p.src)}"></div>`;
        }
    });
    html += `</body></html>`;
    return html;
}

function printViaIframe() {
    const overlay = document.getElementById('print-overlay');
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang tải ảnh in …';
    const oldIframe = document.getElementById('_print_iframe_');
    if(oldIframe) oldIframe.remove();
    const iframe = document.createElement('iframe');
    iframe.id = '_print_iframe_';
    iframe.style.position = 'fixed';
    iframe.style.top = '-9999px';
    iframe.style.left = '0';
    iframe.style.width = '794px';
    iframe.style.height = '1px';
    iframe.style.border = 'none';
    document.body.appendChild(iframe);
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(buildIframeHTML()); doc.close();
    const imgs = Array.from(doc.querySelectorAll('img'));
    let pending = imgs.filter(i => !i.complete).length;
    function done() {
        overlay.classList.remove('show');
        setTimeout(() => {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
            setTimeout(() => iframe.remove(), 10000);
        }, 500);
    }
    if(pending === 0) done();
    else {
        imgs.forEach(img => {
            if(!img.complete) {
                img.addEventListener('load', () => { if(--pending === 0) done(); }, {once:true});
                img.addEventListener('error', () => { if(--pending === 0) done(); }, {once:true});
            }
        });
    }
}

/* Safari iOS + các iOS khác: dùng window.print() + injected CSS đặc biệt đảm bảo tỉ lệ đúng 1 trang A4 */
let injectedStyle = null;
function applySafeIOSPrintCSS() {
    if(injectedStyle) injectedStyle.remove();
    const css = `@media print{
        @page{size:A4 portrait; margin:0mm !important;}
        body, html, .viewer, .main, .content { margin:0 !important; padding:0 !important; background:#fff !important; display:block !important; }
        .page { width:100% !important; height:297mm !important; margin:0 !important; page-break-after:always !important; break-after:page !important; transform:none !important; }
        .page > img { height:297mm !important; object-fit:fill !important; }
        .split-page { height:297mm !important; padding:8mm !important; }
        .split-gap { height:5mm !important; }
    }`;
    injectedStyle = document.createElement('style');
    injectedStyle.textContent = css;
    document.head.appendChild(injectedStyle);
}

function waitAllMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let pending = imgs.filter(img => !img.complete).length;
    if(pending === 0) return cb();
    imgs.forEach(img => {
        if(!img.complete) {
            img.addEventListener('load', () => { if(--pending === 0) cb(); }, {once:true});
            img.addEventListener('error', () => { if(--pending === 0) cb(); }, {once:true});
        }
    });
}

/* Main print handler */
function printProfile() {
    resetZoom();
    const overlay = document.getElementById('print-overlay');
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị…';
    // Chrome Android → iframe (giải pháp ổn định, in đúng 17 trang)
    if(isChromeAndroid) {
        printViaIframe();
        return;
    }
    // iOS (bao gồm Safari và Chrome iOS, Firefox iOS) → window.print + injected style đảm bảo scale A4
    if(isIOS) {
        applySafeIOSPrintCSS();
        waitAllMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 600);
            }, 600);
        });
        return;
    }
    // Desktop (Mac/Win) dùng print chuẩn, media print đã đảm bảo layout
    waitAllMainImages(() => {
        setTimeout(() => {
            overlay.classList.remove('show');
            setTimeout(() => window.print(), 400);
        }, 500);
    });
}

window.addEventListener('beforeprint', () => {
    resetZoom();
    if(isIOS) applySafeIOSPrintCSS();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
