<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THÉP TAM GIANG PROFILE</title>

<link rel="icon" href="./profile-cover-removebg-preview.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
  background:#e5e5e5;
  font-family:Arial,sans-serif;
}

/* PAGE */

.page{
  width:100%;
  max-width:720px;
  aspect-ratio:9/16;
  background:#fff;
  margin:20px auto;
  overflow:hidden;
  position:relative;
  box-shadow:0 5px 20px rgba(0,0,0,.12);
}

/* IMAGE */

img{
  width:100%;
  height:100%;
  display:block;
}

/* FULL IMAGE */
/* giữ nguyên nội dung ảnh */
/* không crop */
/* không bo góc */

.full-bg,
.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}

/* CERTIFICATE */

.certificate-page{
  padding:20px;
  background:#f5f5f5;
}

.certificate-grid{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.certificate-item{
  background:#fff;
  border:1px solid #ddd;
  overflow:hidden;
}

.certificate-item img{
  object-fit:contain;
  background:#fff;
}

.certificate-full-page{
  background:#f5f5f5;
  padding:20px;
}

.certificate-full-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid #ddd;
}

.certificate-full-wrap img{
  object-fit:contain;
  background:#fff;
}

/* COLLAGE */

.collage-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  height:100%;
}

.collage-grid img{
  object-fit:cover;
}

/* MOBILE */

@media(max-width:768px){

  .page{
    width:100%;
    margin:0 auto 15px;
  }

}

</style>

</head>
