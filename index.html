<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THÉP TAM GIANG PROFILE</title>
    <link rel="icon" href="./profile-cover-removebg-preview.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #202124; }
        .viewer { display: flex; width: 100%; height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar { width: 260px; background: #2b2b2b; overflow-y: auto; border-right: 1px solid #3c4043; padding: 14px 12px; display: flex; flex-direction: column; height: 100vh; }
        .thumb { width: 100%; margin-bottom: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .thumb-page { width: 100%; aspect-ratio: 1/1.414; background: #fff; padding: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-page img { width: 100%; height: 100%; object-fit: contain; }
        .thumb span { display: block; text-align: center; color: #fff; margin-top: 8px; font-size: 13px; }

        /* ── MAIN ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; background: #1e1e1e; }
        .toolbar { height: 56px; background: #2b2b2b; border-bottom: 1px solid #3c4043; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; width: 100%; flex-shrink: 0; z-index: 100; }
        .toolbar-title { color: #fff; font-size: 15px; font-weight: 600; }
        .toolbar-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        #zoom-controls { display: flex; align-items: center; gap: 4px; }
        #zoom-controls button { width: 32px; height: 32px; border: none; background: #3c4043; color: #fff; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        #zoom-controls input { width: 55px; height: 26px; background: #202124; border: 1px solid #5f6368; color: #fff; text-align: center; font-size: 12px; outline: none; }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }
        .tool-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px; background: #3c4043; cursor: pointer; border: none; text-decoration: none; }
        .tool-btn svg { width: 20px; height: 20px; fill: #fff; }

        /* ── CONTENT ── */
        .content { flex: 1; overflow-x: hidden; overflow-y: auto; padding: 30px 0; scroll-behavior: smooth; }
        .page { width: 760px; aspect-ratio: 1/1.414; background: #fff; margin: 0 auto 30px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .split-page { display: flex; flex-direction: column; padding: 25px; gap: 25px; }
        .split-half { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* ── MOBILE UI ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .toolbar { flex-direction: column; height: auto; padding: 12px 0; gap: 15px; }
            .toolbar-title { position: static; text-align: center; width: 100%; padding-bottom: 10px; border-bottom: 1px solid #3c4043; }
            .mobile-tools-wrap { display: flex; width: 100%; justify-content: center; align-items: center; position: relative; padding: 0 15px; height: 40px; }
            .toolbar-center { position: absolute; left: 50%; transform: translateX(-50%); }
            #zoom-controls button { width: 38px; height: 38px; background: #4b4d50; }
            .toolbar-right { position: absolute; right: 15px; }
            .tool-btn { width: 38px; height: 38px; background: #4b4d50; }
            .page { width: 95%; margin-bottom: 15px; }
        }

        /* ── PRINT — Desktop / Chrome Android thực ── */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .sidebar, .toolbar, .mobile-tools-wrap, #print-overlay { display: none !important; }
            html, body { background: white !important; width: 210mm !important; height: auto !important; overflow: visible !important; margin: 0 !important; padding: 0 !important; }
            .viewer, .main, .content { display: block !important; width: 210mm !important; height: auto !important; overflow: visible !important; background: white !important; padding: 0 !important; margin: 0 !important; }
            .page { display: block !important; width: 210mm !important; height: 297mm !important; min-height: 297mm !important; max-height: 297mm !important; aspect-ratio: unset !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; overflow: hidden !important; background: white !important; transform: none !important; page-break-after: always !important; break-after: page !important; break-inside: avoid !important; }
            .page:last-child { page-break-after: avoid !important; break-after: avoid !important; }
            .split-page { display: flex !important; flex-direction: column !important; padding: 0 !important; gap: 0 !important; height: 297mm !important; max-height: 297mm !important; overflow: hidden !important; }
            .split-half { flex: 1 !important; width: 100% !important; height: 50% !important; max-height: 50% !important; flex: none !important; overflow: hidden !important; }
            img { width: 100% !important; height: 100% !important; object-fit: fill !important; display: block !important; }
        }

        /* ── OVERLAY ── */
        #print-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #fff; font-size: 15px; font-family: Arial, sans-serif; }
        #print-overlay.show { display: flex; }
        .spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="print-overlay">
    <div class="spinner"></div>

<div class="viewer">

        <div class="thumb" onclick="scrollToPage(6)"><div class="thumb-page"><img src="./ximang-products.jpg"></div><span>6</span></div>

        <div class="thumb" onclick="scrollToPage(15)"><div class="thumb-page"><img src="./project-04.jpg"></div><span>15</span></div>

        <div class="thumb" onclick="scrollToPage(17)"><div class="thumb-page"><img src="./project-01.jpg"></div><span>17</span></div>
        <div class="thumb" onclick="scrollToPage(18)"><div class="thumb-page"><img src="./project-02.jpg"></div><span>18</span></div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="toolbar">
            <div class="toolbar-title">THÉP TAM GIANG PROFILE</div>
            <div class="mobile-tools-wrap">
                <div class="toolbar-center">
                    <div id="zoom-controls">
                        <button onclick="zoomOut()"><svg viewBox="0 -960 960 960" width="24" height="24"><path d="M232-444v-72h496v72H232Z" fill="white"/></svg></button>
                        <input type="text" class="zoomInput" value="100%" readonly>
                        <button onclick="zoomIn()"><svg viewBox="0 -960 960 960" width="24" height="24"><path d="M444-444H240v-72h204v-204h72v204h204v72H516v204h-72v-204Z" fill="white"/></svg></button>
                    </div>
                </div>
                <div class="toolbar-right">
                    <a href="https://drive.google.com/uc?export=download&id=1-CbOZUOEgPujQ9oRuHAX8_ACFzOTI5JP" class="tool-btn">
                        <svg viewBox="0 -960 960 960" width="22" height="22"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z" fill="white"/></svg>
                    </a>
                    <button class="tool-btn" onclick="printProfile()">
                        <svg viewBox="0 -960 960 960" width="22" height="22"><path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z" fill="white"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="content" id="content">
            <section class="page"><img src="./profile-cover.jpg" loading="eager"></section>
            <section class="page"><img src="./company-intro-01.jpg" loading="eager"></section>
            <section class="page"><img src="./company-intro-02.jpg" loading="eager"></section>
            <section class="page"><img src="./main-products.jpg" loading="eager"></section>
            <section class="page"><img src="./thep-products.jpg" loading="eager"></section>
            <section class="page"><img src="./ximang-products.jpg" loading="eager"></section>
            <section class="page"><img src="./thephinh-products.jpg" loading="eager"></section>
            <section class="page"><img src="./vlxd-products.jpg" loading="eager"></section>
            <section class="page"><img src="./project-11.jpg" loading="eager"></section>
            <section class="page"><img src="./project-12.jpg" loading="eager"></section>
            <section class="page"><img src="./project-03.jpg" loading="eager"></section>
            <section class="page"><img src="./project-08.jpg" loading="eager"></section>

            <section class="page split-page">

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════════ */
let zoomLevel = 100;
const content = document.getElementById('content');
function updateZoom() {
    document.querySelectorAll('.page').forEach(p => p.style.transform = `scale(${zoomLevel/100})`);
    document.querySelectorAll('.zoomInput').forEach(i => i.value = zoomLevel + '%');
}
function zoomIn()  { if (zoomLevel < 180) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 50)  { zoomLevel -= 10; updateZoom(); } }
function scrollToPage(n) {
    const pages = document.querySelectorAll('.page');
    let top = 0;
    if      (n <= 14)  top = pages[n-1].offsetTop;
    else if (n === 15) top = pages[14].offsetTop;
    else if (n === 16) top = pages[14].offsetTop + pages[14].offsetHeight / 2;
    else               top = pages[n-2].offsetTop;
    content.scrollTo({ top: top - 20, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════════════════════
   DETECT BROWSER
═══════════════════════════════════════════════════════════════ */
const ua          = navigator.userAgent;
const isIOS       = /iP(hone|ad|od)/i.test(ua);
const isAndroid   = /Android/i.test(ua);
const isChromeIOS = /CriOS/i.test(ua);                          // Chrome trên iPhone/iPad
const isSafariIOS = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS/i.test(ua);
const isMobile    = isIOS || isAndroid;

/* ═══════════════════════════════════════════════════════════════
   DANH SÁCH ẢNH (theo thứ tự trang)
   split-page = 2 ảnh trên 1 trang → đánh dấu isSplit
═══════════════════════════════════════════════════════════════ */
const PAGE_IMAGES = [
    { src: './profile-cover.jpg' },
    { src: './company-intro-01.jpg' },
    { src: './company-intro-02.jpg' },
    { src: './main-products.jpg' },
    { src: './thep-products.jpg' },
    { src: './ximang-products.jpg' },
    { src: './thephinh-products.jpg' },
    { src: './vlxd-products.jpg' },
    { src: './project-11.jpg' },
    { src: './project-12.jpg' },
    { src: './project-03.jpg' },
    { src: './project-08.jpg' },
    { src: './project-09.jpg' },
    { src: './project-10.jpg' },
    { src: './project-04.jpg', split: './project-07.jpg' },  // 1 trang 2 ảnh
    { src: './project-01.jpg' },
    { src: './project-02.jpg' },
];

/* ═══════════════════════════════════════════════════════════════
   SAFARI iOS — inject style pixel vào trang hiện tại
═══════════════════════════════════════════════════════════════ */
function getSafariPaperPx() {
    const pw = Math.min(screen.width, screen.height);
    return { pw, ph: Math.round(pw * 297 / 210) };
}

function buildSafariStyle() {
    const { pw, ph } = getSafariPaperPx();
    const ph2 = Math.round(ph / 2);
    return `@media print {
        @page { size: A4 portrait; margin: 0 !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        #print-overlay, .sidebar, .toolbar, .mobile-tools-wrap { display: none !important; }
        html, body { background: white !important; width: ${pw}px !important; height: auto !important; margin: 0 !important; padding: 0 !important; overflow: visible !important; }
        .viewer, .main, .content { display: block !important; width: ${pw}px !important; height: auto !important; margin: 0 !important; padding: 0 !important; overflow: visible !important; background: white !important; float: none !important; }
        .page { display: block !important; width: ${pw}px !important; height: ${ph}px !important; min-height: ${ph}px !important; max-height: ${ph}px !important; aspect-ratio: unset !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; overflow: hidden !important; background: white !important; transform: none !important; float: none !important; position: relative !important; page-break-after: always !important; page-break-inside: avoid !important; break-after: page !important; break-inside: avoid !important; }
        .page:last-of-type { page-break-after: avoid !important; break-after: avoid !important; }
        .split-page { display: flex !important; flex-direction: column !important; flex-wrap: nowrap !important; padding: 0 !important; gap: 0 !important; height: ${ph}px !important; max-height: ${ph}px !important; overflow: hidden !important; }
        .split-half { display: block !important; width: ${pw}px !important; height: ${ph2}px !important; min-height: ${ph2}px !important; max-height: ${ph2}px !important; flex: none !important; overflow: hidden !important; }
        .content img { display: block !important; width: ${pw}px !important; height: 100% !important; max-width: ${pw}px !important; object-fit: fill !important; }
    }`;
}

let safariStyleEl = null;
function injectSafariStyle() {
    if (safariStyleEl) safariStyleEl.remove();
    safariStyleEl = document.createElement('style');
    safariStyleEl.textContent = buildSafariStyle();
    document.head.appendChild(safariStyleEl);
}

/* ═══════════════════════════════════════════════════════════════
   CHROME iOS — print qua iframe riêng
   
   Chrome iOS không hiểu @page size, không scale đúng paper,
   và không cho window.print() từ trang gốc hoạt động đúng.
   
   Giải pháp: tạo iframe ẩn, viết HTML print-ready vào đó
   (dùng URL ảnh tuyệt đối), rồi gọi iframe.contentWindow.print().
═══════════════════════════════════════════════════════════════ */
function getAbsoluteBase() {
    // Lấy base URL tuyệt đối của trang hiện tại (thư mục chứa file)
    const href = window.location.href;
    return href.substring(0, href.lastIndexOf('/') + 1);
}

function buildIframePrintHTML() {
    const base   = getAbsoluteBase();
    // Chrome iOS: paper width = screen.width (CSS px, đã normalize)
    const pw = Math.min(screen.width, screen.height);
    const ph = Math.round(pw * 297 / 210);
    const ph2 = Math.round(ph / 2);

    let pagesHTML = '';
    PAGE_IMAGES.forEach(p => {
        if (p.split) {
            pagesHTML += `
            <div class="page split-page">
                <div class="split-half"><img src="${base}${p.src.replace('./','')}"></div>
                <div class="split-half"><img src="${base}${p.split.replace('./','')}"></div>
            </div>`;
        } else {
            pagesHTML += `
            <div class="page"><img src="${base}${p.src.replace('./','')}"></div>`;
        }
    });

    return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-print-color-adjust:exact !important; }
@page { size: A4 portrait; margin: 0; }
html, body { background: white; width: ${pw}px; margin: 0; padding: 0; }
.page {
    display: block;
    width: ${pw}px;
    height: ${ph}px;
    overflow: hidden;
    background: white;
    page-break-after: always;
    page-break-inside: avoid;
    break-after: page;
    break-inside: avoid;
}
.page:last-child { page-break-after: avoid; break-after: avoid; }
.page img {
    display: block;
    width: ${pw}px;
    height: ${ph}px;
    object-fit: fill;
}
.split-page {
    display: flex;
    flex-direction: column;
    width: ${pw}px;
    height: ${ph}px;
    overflow: hidden;
}
.split-half {
    width: ${pw}px;
    height: ${ph2}px;
    overflow: hidden;
    flex: none;
}
.split-half img {
    display: block;
    width: ${pw}px;
    height: ${ph2}px;
    object-fit: fill;
}
</style>
</head>
<body>${pagesHTML}</body>
</html>`;
}

function printViaIframe(onDone) {
    const overlay = document.getElementById('print-overlay');
    document.getElementById('overlay-msg').textContent = 'Đang tải ảnh để in…';

    // Xóa iframe cũ nếu có
    const old = document.getElementById('print-iframe');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id    = 'print-iframe';
    iframe.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;border:none;opacity:0;pointer-events:none;z-index:-1;';
    document.body.appendChild(iframe);

    const html = buildIframePrintHTML();
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();

    // Chờ tất cả ảnh trong iframe load xong
    function waitImages(cb) {
        const imgs = Array.from(iframe.contentDocument.querySelectorAll('img'));
        let pending = imgs.filter(i => !i.complete).length;
        if (pending === 0) { cb(); return; }
        imgs.forEach(img => {
            if (!img.complete) {
                const done = () => { if (--pending === 0) cb(); };
                img.addEventListener('load',  done, { once: true });
                img.addEventListener('error', done, { once: true });
            }
        });
    }

    waitImages(() => {
        document.getElementById('overlay-msg').textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            overlay.classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                if (onDone) onDone();
            }, 300);
        }, 400);
    });
}

/* ═══════════════════════════════════════════════════════════════
   MAIN PRINT FUNCTION — tự chọn phương pháp theo trình duyệt
═══════════════════════════════════════════════════════════════ */
function printProfile() {
    const overlay = document.getElementById('print-overlay');

    // Reset zoom
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => p.style.transform = '');
    document.querySelectorAll('.zoomInput').forEach(i => i.value = '100%');

    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in, vui lòng chờ…';

    if (isChromeIOS) {
        /* ── Chrome iOS: dùng iframe ── */
        printViaIframe(() => {
            // Dọn dẹp iframe sau 5s
            setTimeout(() => {
                const f = document.getElementById('print-iframe');
                if (f) f.remove();
            }, 5000);
        });

    } else if (isSafariIOS) {
        /* ── Safari iOS: inject style px ── */
        injectSafariStyle();
        waitAllImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 900);
        });

    } else {
        /* ── Desktop / Android Chrome ── */
        waitAllImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 300);
        });
    }
}

function waitAllImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let pending = imgs.filter(i => !i.complete).length;
    if (pending === 0) { cb(); return; }
    imgs.forEach(img => {
        if (!img.complete) {
            const done = () => { if (--pending === 0) cb(); };
            img.addEventListener('load',  done, { once: true });
            img.addEventListener('error', done, { once: true });
        }
    });
}

/* Fallback beforeprint (Ctrl+P desktop) */
window.addEventListener('beforeprint', () => {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => p.style.transform = '');
    if (isSafariIOS) injectSafariStyle();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
</body>
</html>
