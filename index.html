<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>THÉP TAM GIANG PROFILE</title>

  <link rel="icon" type="image/jpg" href="assets/profile-cover.jpg">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#dcdcdc;
      font-family:Arial,sans-serif;
    }

    .page{
      width:210mm;
      height:297mm;
      margin:20px auto;
      background:#fff;
      overflow:hidden;
      position:relative;
      page-break-after:always;
    }

    img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center;
    }

    .full-bg{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* GRID */

    .collage-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:10px;
      padding:10px;
      width:100%;
      height:100%;
    }

    .gallery-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
      width:100%;
      height:100%;
    }

    .gallery-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:10px;
      width:100%;
      height:100%;
    }

    /* PROJECT */

    .project-layout{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:10px;
      padding:10px;
      width:100%;
      height:100%;
    }

    .main-project{
      overflow:hidden;
      height:100%;
    }

    .project-side-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:10px;
      height:100%;
    }

    .sub-project{
      overflow:hidden;
    }

    /* LOGO */

    .logo-grid-page{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      padding:50px;
      align-content:center;
      width:100%;
      height:100%;
    }

    .logo-grid-page img{
      object-fit:contain;
      background:#fff;
      border:1px solid #ddd;
      padding:20px;
      height:120px;
    }

    @media print{

      body{
        background:#fff;
      }

      .page{
        margin:0;
      }

    }

  </style>

</head>
