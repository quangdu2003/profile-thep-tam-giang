<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THÉP TAM GIANG PROFILE</title>

<link rel="icon" href="./profile-cover-removebg-preview.png">

<style>

/* ===== RESET ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#202124;
}

/* ===== VIEWER ===== */

.viewer{
  display:flex;
  width:100%;
  height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
  width:260px;
  background:#2b2b2b;
  overflow-y:auto;
  border-right:1px solid #3c4043;
  padding:14px 12px;
}

.sidebar::-webkit-scrollbar{
  width:10px;
}

.sidebar::-webkit-scrollbar-track{
  background:#202124;
}

.sidebar::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* ===== THUMB ===== */

.thumb{
  width:100%;
  margin-bottom:18px;
  background:#202124;
  border:2px solid transparent;
  padding:10px;
  cursor:pointer;
  transition:.2s;
}

.thumb:hover{
  border-color:#8ab4f8;
}

.thumb img{
  width:100%;
  display:block;
  background:#fff;
}

.thumb span{
  display:block;
  text-align:center;
  color:#fff;
  margin-top:10px;
  font-size:15px;
}

/* ===== MAIN ===== */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== TOOLBAR ===== */

.toolbar{
  height:56px;
  background:#2b2b2b;
  border-bottom:1px solid #3c4043;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  position:relative;
  z-index: 100;
}

.toolbar-title{
  color:#fff;
  font-size:18px;
  font-weight:600;
  white-space:nowrap;
}

/* ===== ZOOM ===== */

.toolbar-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

#zoom-controls{
  display:flex;
  align-items:center;
  gap:10px;
}

#zoom-controls button{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  color:#fff;
  cursor:pointer;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}

#zoom-controls button:hover{
  background:#3c4043;
}

#zoom-controls svg{
  width:22px;
  height:22px;
  fill:#fff;
}

#zoom-controls input{
  width:65px;
  height:32px;
  background:#202124;
  border:1px solid #5f6368;
  color:#fff;
  text-align:center;
  font-size:14px;
  outline:none;
}

/* ===== RIGHT TOOLS ===== */

.toolbar-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

.tool-btn{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  color:#fff;
  cursor:pointer;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration: none;
}

.tool-btn:hover {
  background: #3c4043;
}

.tool-btn svg{
  width:22px;
  height:22px;
  fill:#fff;
}

/* ===== CONTENT ===== */

.content{
  flex:1;
  overflow-x:hidden;
  overflow-y:auto;
  background:#1e1e1e;
  padding:30px 0;
}

.content::-webkit-scrollbar{
  width:12px;
}

.content::-webkit-scrollbar-track{
  background:#202124;
}

.content::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* ===== PAGE ===== */

.page{
  width:100%;
  max-width:760px;
  aspect-ratio: 1/1.414; 
  background:#fff;
  margin:0 auto 30px;
  overflow:hidden;
  position:relative;
  transform-origin:top center;
  box-shadow:
  0 2px 10px rgba(0,0,0,.35),
  0 0 0 1px rgba(255,255,255,.04);
}

/* ===== SPLIT PAGE ===== */

.split-page{
  display:flex;
  flex-direction:column;
  gap:0;
  padding:0;
  background:#fff;
}

.split-half{
  width:100%;
  height:50%;
  overflow:hidden;
  position:relative;
}

.split-image{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* ===== IMAGE ===== */

img{
  width:100%;
  height:100%;
  display:block;
}

.full-bg,
.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

/* ===== MOBILE ===== */

@media(max-width:768px){
  .sidebar{ display:none; }
  .toolbar{
    height:auto;
    min-height:56px;
    padding:10px 12px;
    display:grid;
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto;
    gap:10px;
  }
  .toolbar-title{ grid-column:1; grid-row:1; font-size:16px; white-space:normal; }
  .toolbar-right { grid-column: 2; grid-row: 1; }
  .toolbar-center{
    position:static; transform:none;
    grid-column:1 / 3; grid-row:2;
    width:100%; display:flex; justify-content:center;
  }
  .page{ max-width:95%; }
}

/* ===== CẤU HÌNH IN FIT TRANG CHUẨN ===== */

@media print {
  @page {
    size: A4 portrait;
    margin: 0;
  }
  
  html, body {
    height: 100% !important;
    overflow: visible !important;
    background: #fff !important;
  }

  .sidebar, .toolbar, .content::-webkit-scrollbar {
    display: none !important;
  }

  .viewer, .main, .content {
    display: block !important;
    height: auto !important;
    width: 100% !important;
    overflow: visible !important;
    padding: 0 !important;
    margin: 0 !important;
    background: #fff !important;
  }

  .page {
    width: 210mm !important;
    height: 297mm !important;
    margin: 0 !important;
    padding: 0 !important;
    page-break-after: always !important;
    page-break-inside: avoid !important;
    box-shadow: none !important;
    transform: scale(1) !important;
    max-width: none !important;
    position: relative !important;
    display: flex !important;
    flex-direction: column !important;
  }

  .page img {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important; /* Đảm bảo fit trọn trang không bị cắt */
    display: block !important;
  }

  .split-page {
    display: flex !important;
    flex-direction: column !important;
  }

  .split-half {
    height: 50% !important;
    width: 100% !important;
    position: relative !important;
  }
  
  .split-half img {
    height: 100% !important;
    object-fit: contain !important;
  }
  
  img {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}

</style>

</head>

<body>

  <div class="thumb" onclick="scrollToPage(15)"><img src="./project-07.jpg"><span>15</span></div>

</div>

<div class="main">

    <div class="toolbar-title">THÉP TAM GIANG PROFILE</div>

    <div class="toolbar-center">
      <span id="zoom-controls">

<script>
let zoomLevel = 100;
function updateZoom(){
  document.querySelectorAll('.page').forEach(page=>{
    page.style.transform = `scale(${zoomLevel / 100})`;
  });
  document.getElementById('zoomInput').value = zoomLevel + '%';
}
function zoomIn(){ if(zoomLevel < 200){ zoomLevel += 10; updateZoom(); } }
function zoomOut(){ if(zoomLevel > 50){ zoomLevel -= 10; updateZoom(); } }

function scrollToPage(index){
  const content = document.getElementById('content');
  const pages = document.querySelectorAll('.page');
  let targetTop = 0;

  if(index <= 11){
    targetTop = pages[index-1].offsetTop;
  } else if(index === 12){
    targetTop = pages[11].offsetTop;
  } else if(index === 13){
    targetTop = pages[11].offsetTop + (pages[11].offsetHeight / 2);
  } else if(index === 14){
    targetTop = pages[12].offsetTop;
  } else if(index === 15){
    targetTop = pages[12].offsetTop + (pages[12].offsetHeight / 2);
  } else {
    targetTop = pages[index-3].offsetTop;
  }

  content.scrollTo({ top: targetTop, behavior:'smooth' });
}
</script>
