<!DOCTYPE html>

<style>
/* ═══ RESET ══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#202124;
}

/* ═══ LAYOUT ══════════════════════════════════════════════════════════ */
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ══════════════════════════════════════════════════════════
   Thumbnail: object-fit:contain để KHÔNG cắt nội dung ảnh
════════════════════════════════════════════════════════════════════════ */
.sidebar {
    width:200px;
    background:#2b2b2b;
    overflow-y:auto;
    overflow-x:hidden;
    border-right:1px solid #3c4043;
    padding:12px 8px;
    display:flex;
    flex-direction:column;
    height:100vh;
    flex-shrink:0;
}
.thumb {
    width:100%;
    margin-bottom:14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}
/* Khung thumb tỉ lệ A4, nền trắng */
.thumb-inner {
    width:100%;
    aspect-ratio:210/297;
    background:#fff;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* Ảnh đơn: contain để thấy toàn bộ nội dung */
.thumb-inner img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
/* Thumb split: 2 ảnh xếp DỌC + đường kẻ đỏ tách rõ */
.thumb-inner.split {
    flex-direction:column;
    align-items:stretch;
    justify-content:flex-start;
}
.thumb-inner.split .th-half {
    flex:1;
    overflow:hidden;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
}
.thumb-inner.split .th-half img {
    width:100%; height:100%;
    object-fit:contain;
}
/* Đường kẻ đỏ nổi bật trong thumb */
.thumb-sep {
    width:100%;
    height:4px;
    background:#cc0000;
    flex-shrink:0;
}
.thumb span {
    display:block;
    text-align:center;
    color:#bbb;
    margin-top:4px;
    font-size:12px;
}
.thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

/* ═══ MAIN ════════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR — DESKTOP ════════════════════════════════════════════════
   Grid 3 cột: title | zoom-center | icons-right
   → zoom luôn căn giữa tuyệt đối
════════════════════════════════════════════════════════════════════════ */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 14px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    justify-self:start;
}
.toolbar-center {
    display:flex;
    align-items:center;
    justify-content:center;
}
#zoom-controls {
    display:flex;
    align-items:center;
    gap:6px;
}
.zoom-btn {
    width:32px; height:32px;
    border:none;
    background:#3c4043;
    color:#fff;
    cursor:pointer;
    border-radius:4px;
    font-size:22px;
    font-weight:300;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    flex-shrink:0;
}
.zoom-btn:hover { background:#5f6368; }
.zoom-val {
    width:60px; height:28px;
    background:#202124;
    border:1px solid #5f6368;
    color:#fff;
    text-align:center;
    font-size:13px;
    outline:none;
    border-radius:3px;
    cursor:default;
}
.toolbar-right {
    display:flex;
    align-items:center;
    gap:8px;
    justify-self:end;
}
.tool-btn {
    width:34px; height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    background:#3c4043;
    cursor:pointer;
    border:none;
    text-decoration:none;
    flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT ════════════════════════════════════════════════════════ */
.content {
    flex:1;
    overflow-x:hidden;
    overflow-y:auto;
    padding:24px 0;
    scroll-behavior:smooth;
}

/* ─── TRANG ĐƠN ─── */
.page {
    width:794px;
    height:1123px;
    background:#fff;
    margin:0 auto 24px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
    position:relative;
    flex-shrink:0;
}
.page > img {
    width:100%; height:100%;
    display:block;
    object-fit:fill;
}

/* ─── TRANG SPLIT: 2 ảnh xếp DỌC + đường kẻ đỏ nổi bật ─── */
.split-page {
    display:flex !important;
    flex-direction:column !important;
}
.split-half {
    flex:1;
    width:100%;
    min-height:0;
    overflow:hidden;
}
.split-half img {
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;
}
/* Đường kẻ đỏ tách 2 ảnh — rõ ràng, dày 8px, shadow để nổi */
.split-divider {
    width:100%;
    height:8px;
    background:#cc0000;
    flex-shrink:0;
    box-shadow:0 0 6px rgba(204,0,0,.6);
}

/* ═══ MOBILE TOOLBAR ══════════════════════════════════════════════════
   Layout 2 hàng:
   Hàng 1: tên profile (full width, centered)
   Hàng 2: [zoom-left] [zoom-val] [zoom-right]  [dl-btn] [print-btn]
════════════════════════════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }

    /* Toolbar 2 hàng */
    .toolbar {
        height:auto;
        display:flex;
        flex-direction:column;
        align-items:stretch;
        padding:8px 10px 8px;
        gap:0;
        grid-template-columns:unset;
    }

    /* Hàng 1: tên profile */
    .toolbar-title {
        width:100%;
        text-align:center;
        font-size:13px;
        padding-bottom:8px;
        border-bottom:1px solid #3c4043;
        justify-self:unset;
        overflow:visible;
        white-space:nowrap;
    }

    /* Hàng 2: zoom + icons trên 1 hàng ngang */
    .toolbar-row2 {
        display:flex;
        align-items:center;
        padding-top:8px;
        gap:0;
    }
    /* Zoom ở chính giữa: flex:1 để chiếm phần còn lại, rồi center nội dung */
    .toolbar-center {
        flex:1;
        display:flex;
        justify-content:center;
        align-items:center;
    }
    .toolbar-right {
        justify-self:unset;
        margin-left:0;
        display:flex;
        align-items:center;
        gap:6px;
    }
    .zoom-btn { width:38px; height:38px; font-size:26px; }
    .zoom-val  { width:54px; height:32px; font-size:13px; }
    .tool-btn  { width:38px; height:38px; }

    /* Trang mobile: full-width, aspect-ratio A4 */
    .page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
    .split-page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
    .split-divider { height:5px; box-shadow:none; }
}

/* ═══ PRINT: Desktop Chrome / Firefox / Edge ══════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * {
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
    }
    .sidebar, .toolbar, #print-overlay { display:none !important; }

    html, body {
        background:white !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important;
        padding:0 !important; margin:0 !important;
    }
    .page {
        display:block !important;
        width:210mm !important;
        height:297mm !important;
        min-height:297mm !important; max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important;
        transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
    }
    .page:last-child {
        page-break-after:avoid !important; break-after:avoid !important;
    }
    .page > img {
        width:210mm !important; height:297mm !important;
        object-fit:fill !important; display:block !important;
    }
    /* Split print */
    .split-page {
        display:flex !important; flex-direction:column !important;
        width:210mm !important; height:297mm !important;
        overflow:hidden !important;
    }
    .split-half {
        flex:1 !important;
        width:210mm !important;
        min-height:0 !important;
        overflow:hidden !important;
        display:flex !important;
        align-items:stretch !important;
    }
    .split-half img {
        width:210mm !important; height:100% !important;
        object-fit:fill !important; display:block !important;
    }
    .split-divider {
        width:210mm !important; height:8px !important;
        background:#cc0000 !important;
        flex-shrink:0 !important;
        display:block !important;
        box-shadow:none !important;
    }
}

/* ═══ OVERLAY ════════════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;

#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,.2); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>

<script>
/* ═══════════════════════════════════════════════════════════════════
   MOBILE LAYOUT SWITCH
   Dùng JS vì CSS không thể move DOM element.
   Trên mobile: ẩn toolbar-center & toolbar-right ở hàng 1,
   hiện #toolbar-row2 ở hàng 2.
═══════════════════════════════════════════════════════════════════ */
function applyLayout() {
    const isMobileLayout = window.innerWidth <= 768;
    const row2 = document.getElementById('toolbar-row2');
    const zoomDesktop = document.getElementById('zoom-slot-desktop');
    const iconsDesktop = document.getElementById('icons-slot-desktop');

    if (isMobileLayout) {
        row2.style.display = 'flex';
        zoomDesktop.style.display = 'none';
        iconsDesktop.style.display = 'none';
    } else {
        row2.style.display = 'none';
        zoomDesktop.style.display = 'flex';
        iconsDesktop.style.display = 'flex';
    }
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ═══════════════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════════════ */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel / 100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff / 2}px`;
        p.style.marginBottom = `${24 - diff / 2}px`;
    });
    // Cập nhật cả 2 input (desktop + mobile)
    document.getElementById('zoom-display').value   = zoomLevel + '%';
    document.getElementById('zoom-display-m').value = zoomLevel + '%';
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }

function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.getElementById('zoom-display').value   = '100%';
    document.getElementById('zoom-display-m').value = '100%';
}

function scrollToPage(idx) {
    const el = document.getElementById('p' + idx);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════════════════════════
   DETECT BROWSER
═══════════════════════════════════════════════════════════════════ */
const ua = navigator.userAgent;
const isIOS           = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS     = /CriOS/i.test(ua);
/* Safari iOS = iOS + WebKit, không phải Chrome/Firefox/Opera iOS */

function getBase() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/') + 1);
}

/* ═══════════════════════════════════════════════════════════════════
   IFRAME PRINT — Chrome iOS & Chrome Android
   ---------------------------------------------------------------
   Chrome mobile bỏ qua @page size, render theo viewport.
   → Tạo iframe với body width = 794px (210mm@96dpi).
     Mỗi page height = 1123px (297mm@96dpi) + page-break → 17 trang.
   
   QUAN TRỌNG: iframe.width phải >= 794px để Chrome không thu hẹp.
   Dùng width:794px nhưng đặt ở ngoài màn hình (top:-9999px).
═══════════════════════════════════════════════════════════════════ */
function buildIframeHTML() {
    const base = getBase();
    /* A4 @ 96dpi */
    const W = 794, H = 1123;
    /* Chia đôi trừ divider 8px */
    const H2 = Math.floor((H - 8) / 2);
    const abs = r => base + r.replace(/^\.\//, '');

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-print-color-adjust:exact!important;
  print-color-adjust:exact!important}
@page{size:210mm 297mm;margin:0}
html,body{width:${W}px;background:#fff;margin:0;padding:0}
.p{
  display:block;width:${W}px;height:${H}px;
  overflow:hidden;background:#fff;
  page-break-after:always;break-after:page;
  page-break-inside:avoid;break-inside:avoid
}
.p:last-child{page-break-after:avoid;break-after:avoid}
.p>img{display:block;width:${W}px;height:${H}px;object-fit:fill}
.sp{display:flex;flex-direction:column;width:${W}px;height:${H}px;overflow:hidden}
.sh{flex:none;width:${W}px;height:${H2}px;overflow:hidden;display:block}
.sh img{display:block;width:${W}px;height:${H2}px;object-fit:fill}
.sd{width:${W}px;height:8px;background:#cc0000;flex-shrink:0;display:block}
</style></head><body>`;

    PAGES.forEach(p => {
        if (p.t === '2') {
            html += `<div class="p sp">`
                  + `<div class="sh"><img src="${abs(p.src)}"></div>`
                  + `<div class="sd"></div>`
                  + `<div class="sh"><img src="${abs(p.src2)}"></div>`
                  + `</div>`;
        } else {
            html += `<div class="p"><img src="${abs(p.src)}"></div>`;
        }
    });
    return html + `</body></html>`;
}

function printViaIframe() {
    const msgEl = document.getElementById('overlay-msg');
    msgEl.textContent = 'Đang tải ảnh để in…';

    const old = document.getElementById('_pf');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id = '_pf';
    /*
     * Width = 794px để Chrome render đúng layout A4.
     * Đặt position:fixed ngoài màn hình để không ảnh hưởng giao diện.
     */
    iframe.style.cssText =
        'position:fixed;top:-9999px;left:0;' +
        'width:794px;height:1px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(buildIframeHTML());
    doc.close();

    /* Chờ tất cả ảnh load trong iframe */
    function waitImgs(cb) {
        const imgs = Array.from(doc.querySelectorAll('img'));
        let n = imgs.filter(i => !i.complete).length;
        if (!n) return cb();
        imgs.forEach(img => {
            if (!img.complete) {
                const fn = () => { if (!--n) cb(); };
                img.addEventListener('load',  fn, {once:true});
                img.addEventListener('error', fn, {once:true});
            }
        });
    }

    waitImgs(() => {
        msgEl.textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            document.getElementById('print-overlay').classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => iframe.remove(), 15000);
            }, 400);
        }, 400);
    });
}

/* ═══════════════════════════════════════════════════════════════════
   SAFARI iOS PRINT
   ---------------------------------------------------------------
   Safari iOS bỏ qua @page size hoàn toàn.
   Paper width (CSS px) = chiều rộng màn hình ở portrait.
   
   Dùng: screen.width nếu portrait, screen.height nếu landscape.
   Math.min(screen.width, screen.height) luôn ra portrait width.
   
   Inject <style> với kích thước px tuyệt đối vào document
   rồi gọi window.print(). Safari sẽ dùng đúng kích thước đó.
═══════════════════════════════════════════════════════════════════ */
let _safariEl = null;

function buildSafariCSS() {
    /*
     * Portrait CSS px width của Safari iOS.
     * screen.width / screen.height bao giờ cũng là giá trị portrait/landscape
     * thực tế của thiết bị, không phụ thuộc orientation hiện tại.
     */
    const pw  = Math.min(screen.width, screen.height);   /* portrait width */
    const ph  = Math.round(pw * 297 / 210);              /* A4 height */
    const dh  = 8;                                        /* divider height px */
    const ph2 = Math.floor((ph - dh) / 2);               /* nửa trang */

    return `@media print{
@page{size:${pw}px ${ph}px;margin:0!important}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
#print-overlay,.sidebar,.toolbar,#toolbar-row2{display:none!important}
html,body{
  background:#fff!important;
  width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;overflow:visible!important
}
.viewer,.main,.content{
  display:block!important;
  width:${pw}px!important;height:auto!important;
  margin:0!important;padding:0!important;
  overflow:visible!important;background:#fff!important
}
.page{
  display:block!important;
  width:${pw}px!important;
  height:${ph}px!important;min-height:${ph}px!important;max-height:${ph}px!important;
  margin:0!important;padding:0!important;
  border:none!important;box-shadow:none!important;
  overflow:hidden!important;background:#fff!important;transform:none!important;
  page-break-after:always!important;break-after:page!important;
  page-break-inside:avoid!important;break-inside:avoid!important
}
.page:last-child{page-break-after:avoid!important;break-after:avoid!important}
.page>img{
  width:${pw}px!important;height:${ph}px!important;
  object-fit:fill!important;display:block!important
}
.split-page{
  display:flex!important;flex-direction:column!important;
  width:${pw}px!important;height:${ph}px!important;overflow:hidden!important
}
.split-half{
  flex:none!important;
  width:${pw}px!important;height:${ph2}px!important;
  overflow:hidden!important;display:block!important
}
.split-half img{
  width:${pw}px!important;height:${ph2}px!important;
  object-fit:fill!important;display:block!important
}
.split-divider{
  width:${pw}px!important;height:${dh}px!important;
  background:#cc0000!important;
  display:block!important;flex-shrink:0!important;box-shadow:none!important
}
}`;
}

function injectSafariCSS() {
    if (_safariEl) _safariEl.remove();
    _safariEl = document.createElement('style');
    _safariEl.id = '_safari_print';
    _safariEl.textContent = buildSafariCSS();
    document.head.appendChild(_safariEl);
}

/* ═══════════════════════════════════════════════════════════════════
   WAIT MAIN IMAGES
═══════════════════════════════════════════════════════════════════ */
function waitMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let n = imgs.filter(i => !i.complete).length;
    if (!n) return cb();
    imgs.forEach(img => {
        if (!img.complete) {
            const fn = () => { if (!--n) cb(); };
            img.addEventListener('load',  fn, {once:true});
            img.addEventListener('error', fn, {once:true});
        }
    });
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN PRINT

function printProfile() {
    const overlay = document.getElementById('print-overlay');
    resetZoom();
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (needsIframe) {
        /* ── Chrome iOS + Chrome Android ── */
        printViaIframe();

    } else if (isSafariIOS) {
        /* ── Safari iOS ── */
        injectSafariCSS();
        waitMainImages(() => {
            /* Đợi style apply xong */
            setTimeout(() => {
                overlay.classList.remove('show');
                /* Thêm delay nhỏ để Safari đọc style mới trước khi print */
                setTimeout(() => window.print(), 400);
            }, 600);
        });

    } else {
        /* ── Desktop & Firefox Android ── */
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

/* Ctrl+P fallback */
window.addEventListener('beforeprint', () => {
    resetZoom();
    if (isSafariIOS) injectSafariCSS();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
