<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>THÉP TAM GIANG PROFILE</title>
<link rel="icon" href="./profile-cover-removebg-preview.png">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#202124;
}
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ═══════════════════════════════════════════════════════ */
.sidebar {
    width:200px;
    background:#2b2b2b;
    overflow-y:auto;
    overflow-x:hidden;
    border-right:1px solid #3c4043;
    padding:12px 8px;
    display:flex;
    flex-direction:column;
    height:100vh;
    flex-shrink:0;
}
.thumb {
    width:100%;
    margin-bottom:14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.thumb-inner {
    width:100%;
    aspect-ratio:210/297;
    background:#fff;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* Mặc định tất cả thumb dùng contain */
.thumb-inner img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
/* Thumb 15 & 16: ảnh project-04/07 là ảnh ngang nằm trong nửa trang dọc
   → thumb riêng có aspect-ratio 210/148 (nửa A4 trừ padding/gap)
   → fill ngang hoàn toàn */
.thumb-inner.half-page {
    aspect-ratio:210/148;
}
.thumb-inner.half-page img {
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    display:block;
}
.thumb span {
    display:block;
    text-align:center;
    color:#bbb;
    margin-top:4px;
    font-size:12px;
}
.thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

/* ═══ MAIN ═════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR ═══════════════════════════════════════════════════════ */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 14px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff; font-size:14px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; justify-self:start;
}
.toolbar-center { display:flex; align-items:center; justify-content:center; }
.zoom-btn {
    width:32px; height:32px; border:none; background:#3c4043; color:#fff;
    cursor:pointer; border-radius:4px; font-size:22px; font-weight:300;
    display:flex; align-items:center; justify-content:center; user-select:none; flex-shrink:0;
}
.zoom-btn:hover { background:#5f6368; }
.zoom-val {
    width:60px; height:28px; background:#202124; border:1px solid #5f6368; color:#fff;
    text-align:center; font-size:13px; outline:none; border-radius:3px; cursor:default; margin:0 4px;
}
.toolbar-right { display:flex; align-items:center; gap:8px; justify-self:end; }
.tool-btn {
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; background:#3c4043; cursor:pointer; border:none; text-decoration:none; flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT ═══════════════════════════════════════════════════════ */
.content {
    flex:1; overflow-x:hidden; overflow-y:auto; padding:24px 0; scroll-behavior:smooth;
}
.page {
    width:794px; height:1123px; background:#fff;
    margin:0 auto 24px; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.6); position:relative; flex-shrink:0;
}
.page > img { width:100%; height:100%; display:block; object-fit:fill; }

/* Split page: 2 ảnh xếp dọc trong 1 trang A4 */
.split-page {
    background:#d0d0d0 !important;
    display:flex !important; flex-direction:column !important;
    padding:16px !important; gap:0 !important;
}
.split-half {
    flex:1; min-height:0; overflow:hidden; background:#fff;
    display:flex; align-items:center; justify-content:center;
}
.split-half img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
.split-gap { height:20px; flex-shrink:0; background:#d0d0d0; }

/* ═══ MOBILE ════════════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }
    .toolbar {
        height:auto; display:flex; flex-direction:column;
        align-items:stretch; padding:8px 10px; gap:0; grid-template-columns:unset;
    }
    .toolbar-title {
        width:100%; text-align:center; font-size:13px;
        padding-bottom:8px; border-bottom:1px solid #3c4043; justify-self:unset;
    }
    .toolbar-center, .toolbar-right { display:none !important; }
    .page { width:95vw !important; height:auto !important; aspect-ratio:210/297; }
    .split-page { padding:8px !important; }
    .split-gap { height:10px; }
}

/* ═══ PRINT (Desktop Chrome/Edge/Firefox) ═══════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    .sidebar, .toolbar, #toolbar-row2, #print-overlay { display:none !important; }
    html, body {
        background:white !important; width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important; width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important; padding:0 !important; margin:0 !important;
    }
    .page {
        display:block !important; width:210mm !important;
        height:297mm !important; min-height:unset !important; max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important; transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
    }
    .page:last-child { page-break-after:avoid !important; break-after:avoid !important; }
    .page > img { width:210mm !important; height:297mm !important; object-fit:fill !important; display:block !important; }
    .split-page {
        background:#d0d0d0 !important; display:flex !important; flex-direction:column !important;
        width:210mm !important; height:297mm !important; padding:8mm !important; gap:0 !important;
        overflow:hidden !important;
    }
    .split-half {
        flex:1 !important; min-height:0 !important; background:#fff !important;
        display:flex !important; align-items:center !important; justify-content:center !important; overflow:hidden !important;
    }
    .split-half img { max-width:100% !important; max-height:100% !important; object-fit:contain !important; display:block !important; }
    .split-gap { height:8mm !important; background:#d0d0d0 !important; flex-shrink:0 !important; }
}

/* ═══ OVERLAY ═══════════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; font-size:15px;
}
#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,.2); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

    <div class="main">

<script>
/* ── Layout switch ─────────────────────────────────────────────────── */
function applyLayout() {
    const mob = window.innerWidth <= 768;
    document.getElementById('toolbar-row2').style.display = mob ? 'block' : 'none';
    document.getElementById('zoom-d').style.display  = mob ? 'none' : 'flex';
    document.getElementById('icons-d').style.display = mob ? 'none' : 'flex';
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ── Zoom ──────────────────────────────────────────────────────────── */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel/100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff/2}px`;
        p.style.marginBottom = `${24 - diff/2}px`;
    });
    document.getElementById('zoom-display').value   = zoomLevel + '%';
    document.getElementById('zoom-display-m').value = zoomLevel + '%';
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }
function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.getElementById('zoom-display').value   = '100%';
    document.getElementById('zoom-display-m').value = '100%';
}

/* ── Scroll ────────────────────────────────────────────────────────── */
function scrollToPage(i) {
    const el = document.getElementById('p' + i);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior: 'smooth' });
}

function scrollToSplitHalf(half) {
    const page = document.getElementById('p14');
    if (!page) return;
    if (half === 'top') {
        contentEl.scrollTo({ top: page.offsetTop - 16, behavior: 'smooth' });
    } else {
        const botEl = document.getElementById('split-bot');
        if (botEl) {
            contentEl.scrollTo({ top: page.offsetTop + botEl.offsetTop - 16, behavior: 'smooth' });
        }
    }
}

/* ── Browser detect ────────────────────────────────────────────────── */
const ua = navigator.userAgent;
const isIOS           = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS     = /CriOS/i.test(ua);
const isSafariIOS = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS|EdgiOS/i.test(ua);
const isAndroid       = /Android/i.test(ua);
const isChromeAndroid = isAndroid && /Chrome/i.test(ua) && !/Firefox/i.test(ua);
/*
 * iOS: dùng iframe + ẩn body gốc khi print → Safari chỉ in iframe, không in 2 lần.
 * Chrome Android: iframe như cũ.
 */
const needsIframe = isChromeAndroid || isIOS;

/* ── Pages data (17 trang thật) ────────────────────────────────────── */
const PAGES = [
    { t:'s', src:'./profile-cover.jpg' },
    { t:'s', src:'./company-intro-01.jpg' },
    { t:'s', src:'./company-intro-02.jpg' },
    { t:'s', src:'./main-products.jpg' },
    { t:'s', src:'./thep-products.jpg' },
    { t:'s', src:'./ximang-products.jpg' },
    { t:'s', src:'./thephinh-products.jpg' },
    { t:'s', src:'./vlxd-products.jpg' },
    { t:'s', src:'./project-11.jpg' },
    { t:'s', src:'./project-12.jpg' },
    { t:'s', src:'./project-03.jpg' },
    { t:'s', src:'./project-08.jpg' },
    { t:'s', src:'./project-09.jpg' },
    { t:'s', src:'./project-10.jpg' },
    { t:'2', src:'./project-04.jpg', src2:'./project-07.jpg' },
    { t:'s', src:'./project-01.jpg' },
    { t:'s', src:'./project-02.jpg' },
];

function getBase() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/') + 1);
}

/* ── Mobile print: fetch ảnh → base64 → mở tab mới → print ────────── */
async function imgToBase64(url) {
    const res = await fetch(url);
    const blob = await res.blob();
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}

async function printViaMobileTab() {
    const msgEl = document.getElementById('overlay-msg');
    const overlay = document.getElementById('print-overlay');
    const base = getBase();
    const abs = r => base + r.replace(/^\.\//,'');

    /* Thu thập danh sách URL cần fetch */
    const urlSet = new Set();
    PAGES.forEach(p => { urlSet.add(abs(p.src)); if (p.src2) urlSet.add(abs(p.src2)); });
    const urls = [...urlSet];

    /* Fetch song song */
    msgEl.textContent = 'Đang tải ảnh để in…';
    const b64map = {};
    await Promise.all(urls.map(async url => {
        try { b64map[url] = await imgToBase64(url); }
        catch(e) { b64map[url] = url; }
    }));

    /* Xây nội dung HTML */
    let body = '';
    PAGES.forEach(p => {
        const s1 = b64map[abs(p.src)];
        if (p.t === '2') {
            const s2 = b64map[abs(p.src2)];
            body += `<div class="p sp"><div class="sh"><img src="${s1}"></div><div class="sg"></div><div class="sh"><img src="${s2}"></div></div>`;
        } else {
            body += `<div class="p"><img src="${s1}"></div>`;
        }
    });

    const printHTML = `<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
@page{size:A4 portrait;margin:0}
html,body{background:#fff;margin:0;padding:0;width:100%}
.p{width:100vw;height:100vh;overflow:hidden;background:#fff;display:block;page-break-after:always;break-after:page;page-break-inside:avoid;break-inside:avoid}

/* ── printProfile ──────────────────────────────────────────────────── */
/* ── printProfile ──────────────────────────────────────────────────── */
function printProfile() {
    const overlay = document.getElementById('print-overlay');
    resetZoom();
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (needsIframe) {
        /* iOS và Android: mở tab mới với ảnh base64 → print */
        printViaMobileTab().catch(e => {
            overlay.classList.remove('show');
            alert('Lỗi khi in: ' + e.message);
        });
    } else {
        /* Desktop: Chrome, Edge, Firefox, Safari macOS */
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

window.addEventListener('beforeprint', () => {
    resetZoom();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
