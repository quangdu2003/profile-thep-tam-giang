<style>

/* ===== RESET ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#202124;
}

/* ===== VIEWER ===== */

.viewer{
  display:flex;
  width:100%;
  height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
  width:260px;
  background:#2b2b2b;
  overflow-y:auto;
  border-right:1px solid #3c4043;
  padding:14px 12px;
}

/* scrollbar */

.sidebar::-webkit-scrollbar{
  width:10px;
}

.sidebar::-webkit-scrollbar-track{
  background:#202124;
}

.sidebar::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* THUMB */

.thumb{
  width:100%;
  margin-bottom:18px;
  background:#202124;
  border:2px solid transparent;
  padding:10px;
  cursor:pointer;
  transition:.2s;
}

.thumb:hover{
  border-color:#8ab4f8;
}

.thumb img{
  width:100%;
  display:block;
  background:#fff;
}

.thumb span{
  display:block;
  text-align:center;
  color:#fff;
  margin-top:10px;
  font-size:15px;
}

/* ===== MAIN ===== */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== TOOLBAR ===== */

.toolbar{
  height:56px;
  background:#2b2b2b;
  border-bottom:1px solid #3c4043;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  position:relative;
}

/* LEFT */

.toolbar-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.toolbar-title{
  color:#fff;
  font-size:18px;
  font-weight:600;
}

/* CENTER */

.toolbar-center{
  display:flex;
  align-items:center;
  gap:12px;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

/* RIGHT */

.toolbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* ===== TOOL BUTTON ===== */

.tool-btn{
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  transition:.2s;
  border-radius:4px;
}

.tool-btn:hover{
  background:#3c4043;
}

/* ZOOM */

.zoom-text{
  color:#fff;
  font-size:15px;
  min-width:55px;
  text-align:center;
}

/* ===== CONTENT ===== */

.content{
  flex:1;
  overflow:auto;
  background:#1e1e1e;
  padding:30px 0;
}

/* scrollbar */

.content::-webkit-scrollbar{
  width:12px;
}

.content::-webkit-scrollbar-track{
  background:#202124;
}

.content::-webkit-scrollbar-thumb{
  background:#5f6368;
}

/* ===== PAGE ===== */

.page{
  width:100%;
  max-width:760px;
  aspect-ratio:9/16;
  background:#fff;
  margin:0 auto 30px;
  overflow:hidden;
  position:relative;
  transform-origin:top center;
  box-shadow:
  0 2px 10px rgba(0,0,0,.35),
  0 0 0 1px rgba(255,255,255,.04);
}

/* ===== IMAGE ===== */

img{
  width:100%;
  height:100%;
  display:block;
}

.full-bg,
.cover-image{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}

/* ===== CERTIFICATE ===== */

.certificate-page{
  padding:20px;
  background:#f5f5f5;
}

.certificate-grid{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.certificate-item{
  background:#fff;
  border:1px solid #ddd;
  overflow:hidden;
}

.certificate-item img{
  object-fit:contain;
  background:#fff;
}

.certificate-full-page{
  background:#f5f5f5;
  padding:20px;
}

.certificate-full-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid #ddd;
}

.certificate-full-wrap img{
  object-fit:contain;
  background:#fff;
}

/* ===== COLLAGE ===== */

.collage-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:10px;
  width:100%;
  height:100%;
}

.collage-grid img{
  object-fit:cover;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

  .sidebar{
    display:none;
  }

  .toolbar{
    padding:0 10px;
  }

  .toolbar-title{
    font-size:14px;
  }

  .toolbar-center{
    gap:5px;
  }

  .content{
    padding:10px 0;
  }

  .page{
    max-width:95%;
  }

}

</style>

</head>

<script>

let zoomLevel = 100;

function updateZoom(){

  document.querySelectorAll('.page').forEach(page=>{

    page.style.transform = `scale(${zoomLevel / 100})`;

  });

  document.getElementById('zoomText').innerText = zoomLevel + '%';

}

function zoomIn(){

  if(zoomLevel < 200){

    zoomLevel += 10;
    updateZoom();

  }

}

function zoomOut(){

  if(zoomLevel > 50){

    zoomLevel -= 10;
    updateZoom();

  }

}

function scrollToPage(index){

  const pages = document.querySelectorAll('.page');

  if(pages[index - 1]){

    pages[index - 1].scrollIntoView({

      behavior:'smooth'

    });

  }

}

</script>
