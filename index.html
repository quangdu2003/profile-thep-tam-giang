<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THÉP TAM GIANG PROFILE</title>
<link rel="icon" href="./profile-cover-removebg-preview.png">
<style>
/* ═══ RESET ═══════════════════════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:Arial,sans-serif; background:#202124; }

/* ═══ LAYOUT ══════════════════════════════════════════════════════ */
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ═════════════════════════════════════════════════════ */
.sidebar {
    width:220px; background:#2b2b2b; overflow-y:auto;
    border-right:1px solid #3c4043; padding:14px 10px;
    display:flex; flex-direction:column; height:100vh; flex-shrink:0;
}
.thumb { width:100%; margin-bottom:16px; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
.thumb-page {
    width:100%; aspect-ratio:1/1.414; background:#fff;
    padding:3px; overflow:hidden; position:relative;
}
/* Thumb trang thường */
.thumb-page img { width:100%; height:100%; object-fit:cover; display:block; }
/* Thumb trang split: 2 ảnh xếp dọc */
.thumb-page.split { display:flex; flex-direction:column; padding:2px; gap:2px; }
.thumb-page.split img { flex:1; width:100%; object-fit:cover; }

.thumb span { display:block; text-align:center; color:#bbb; margin-top:5px; font-size:12px; }
.thumb:hover .thumb-page { outline:2px solid #8ab4f8; }

/* ═══ MAIN ════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR ═════════════════════════════════════════════════════ */
.toolbar {
    height:52px; background:#2b2b2b; border-bottom:1px solid #3c4043;
    display:flex; align-items:center; padding:0 16px;
    flex-shrink:0; position:relative;
}
.toolbar-title { color:#fff; font-size:14px; font-weight:600; }
.toolbar-center { position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:4px; }
#zoom-controls { display:flex; align-items:center; gap:4px; }
#zoom-controls button {
    width:30px; height:30px; border:none; background:#3c4043; color:#fff;
    cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center;
}
#zoom-controls input {
    width:52px; height:26px; background:#202124; border:1px solid #5f6368;
    color:#fff; text-align:center; font-size:12px; outline:none; border-radius:3px;
}
.toolbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.tool-btn {
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; background:#3c4043; cursor:pointer; border:none; text-decoration:none;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT AREA ════════════════════════════════════════════════ */
.content { flex:1; overflow-x:hidden; overflow-y:auto; padding:24px 0; scroll-behavior:smooth; }

/* ─── PAGE THƯỜNG (1 ảnh / trang) ─── */
.page {
    width:794px; /* A4 @ 96dpi */
    height:1123px;
    background:#fff;
    margin:0 auto 24px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.6);
    position:relative;
    flex-shrink:0;
}
.page > img {
    width:100%; height:100%;
    display:block; object-fit:fill;
}

/* ─── SPLIT PAGE (2 ảnh / trang) ─── */
/* Hiển thị trên web: 2 ảnh xếp DỌC trong 1 trang A4 */
.split-page {
    display:flex;
    flex-direction:column;
}
.split-half {
    flex:1;
    width:100%;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}
.split-half img {
    width:100%; height:100%;
    object-fit:fill;
    display:block;
}

/* ═══ MOBILE UI ═══════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }
    .toolbar { flex-wrap:wrap; height:auto; padding:10px 12px; gap:10px; }
    .toolbar-title { width:100%; text-align:center; font-size:13px; padding-bottom:8px; border-bottom:1px solid #3c4043; }
    .toolbar-center { position:static; transform:none; flex:1; justify-content:center; }
    .toolbar-right { margin-left:0; }
    .page { width:95%; height:auto; aspect-ratio:210/297; }
    .split-page { aspect-ratio:210/297; height:auto; }
    .split-half { flex:1; }
}

/* ═══ PRINT — Desktop (Chrome / Firefox / Edge) ════════════════════
   Mỗi .page = 1 tờ A4 chính xác
   split-page: 2 ảnh xếp dọc trên 1 tờ (giống giao diện web)
════════════════════════════════════════════════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }

    /* Ẩn UI */
    .sidebar, .toolbar, #print-overlay { display:none !important; }

    html, body {
        background:white !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important;
        padding:0 !important; margin:0 !important;
    }

    /* PAGE: mỗi trang = 1 tờ A4 */
    .page {
        display:block !important;
        width:210mm !important;
        height:297mm !important;
        min-height:297mm !important;
        max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important;
        transform:none !important;
        page-break-after:always !important;
        page-break-inside:avoid !important;
        break-after:page !important;
        break-inside:avoid !important;
        position:relative !important;
    }
    .page:last-child { page-break-after:avoid !important; break-after:avoid !important; }

    /* ẢNH thường */
    .page > img {
        width:210mm !important; height:297mm !important;
        object-fit:fill !important; display:block !important;
    }

    /* SPLIT: 2 ảnh xếp dọc trên 1 tờ A4 */
    .split-page {
        display:flex !important;
        flex-direction:column !important;
        width:210mm !important;
        height:297mm !important;
        overflow:hidden !important;
    }
    .split-half {
        flex:1 1 50% !important;
        width:210mm !important;
        max-height:148.5mm !important;
        overflow:hidden !important;
        display:block !important;
    }
    .split-half img {
        width:210mm !important;
        height:148.5mm !important;
        object-fit:fill !important;
        display:block !important;
    }
}

/* ═══ OVERLAY ═════════════════════════════════════════════════════ */
#print-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; font-size:15px; font-family:Arial,sans-serif;
}
#print-overlay.show { display:flex; }
.spinner {
    width:44px; height:44px;
    border:4px solid rgba(255,255,255,0.2); border-top-color:#fff;
    border-radius:50%; animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

                    <svg viewBox="0 -960 960 960"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z" fill="white"/></svg>

                    <svg viewBox="0 -960 960 960"><path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z" fill="white"/></svg>

        <div class="content" id="content">

<script>
/* ═══════════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════════ */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel / 100})`;
        // Điều chỉnh margin để không bị chồng lên nhau khi scale
        const page = p;
        const h = page.offsetHeight;
        const scaledH = h * (zoomLevel / 100);
        const diff = h - scaledH;
        page.style.marginBottom = `${24 - diff / 2}px`;
        page.style.marginTop = `${-diff / 2}px`;
    });
    document.querySelectorAll('.zoomInput').forEach(i => i.value = zoomLevel + '%');
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }

function scrollToPage(idx) {
    const el = document.getElementById('p' + idx);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior:'smooth' });
}

/* ═══════════════════════════════════════════════════════════════
   DETECT BROWSER
═══════════════════════════════════════════════════════════════ */
const ua          = navigator.userAgent;
const isIOS       = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS = /CriOS/i.test(ua);
const isSafariIOS = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS/i.test(ua);
const isAndroid   = /Android/i.test(ua);
const isMobile    = isIOS || isAndroid;

/* ═══════════════════════════════════════════════════════════════
   DANH SÁCH TRANG (để build iframe)
═══════════════════════════════════════════════════════════════ */
const PAGES = [
    { type:'single', src:'./profile-cover.jpg' },
    { type:'single', src:'./company-intro-01.jpg' },
    { type:'single', src:'./company-intro-02.jpg' },
    { type:'single', src:'./main-products.jpg' },
    { type:'single', src:'./thep-products.jpg' },
    { type:'single', src:'./ximang-products.jpg' },
    { type:'single', src:'./thephinh-products.jpg' },
    { type:'single', src:'./vlxd-products.jpg' },
    { type:'single', src:'./project-11.jpg' },
    { type:'single', src:'./project-12.jpg' },
    { type:'single', src:'./project-03.jpg' },
    { type:'single', src:'./project-08.jpg' },
    { type:'single', src:'./project-09.jpg' },
    { type:'single', src:'./project-10.jpg' },
    { type:'split',  src:'./project-04.jpg', src2:'./project-07.jpg' },
    { type:'single', src:'./project-01.jpg' },
    { type:'single', src:'./project-02.jpg' },
];

/* ═══════════════════════════════════════════════════════════════
   SAFARI iOS — inject style với px thực tế
═══════════════════════════════════════════════════════════════ */
function buildSafariPrintStyle() {
    // Safari iOS dùng screen.width (CSS px portrait) làm paper width
    const pw  = Math.min(screen.width, screen.height);
    const ph  = Math.round(pw * 297 / 210);
    const ph2 = Math.round(ph / 2);

    return `
@media print {
    @page { size:A4 portrait; margin:0 !important; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    #print-overlay, .sidebar, .toolbar { display:none !important; }
    html, body {
        background:white !important;
        width:${pw}px !important; height:auto !important;
        margin:0 !important; padding:0 !important; overflow:visible !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:${pw}px !important; height:auto !important;
        margin:0 !important; padding:0 !important;
        overflow:visible !important; background:white !important;
    }
    .page {
        display:block !important;
        width:${pw}px !important; height:${ph}px !important;
        min-height:${ph}px !important; max-height:${ph}px !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important;
        transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
        position:relative !important;
    }
    .page:last-child { page-break-after:avoid !important; break-after:avoid !important; }
    .page > img { width:${pw}px !important; height:${ph}px !important; object-fit:fill !important; display:block !important; }
    .split-page { display:flex !important; flex-direction:column !important; height:${ph}px !important; overflow:hidden !important; }
    .split-half { flex:none !important; width:${pw}px !important; height:${ph2}px !important; overflow:hidden !important; display:block !important; }
    .split-half img { width:${pw}px !important; height:${ph2}px !important; object-fit:fill !important; display:block !important; }
}`;
}

let safariStyleEl = null;
function injectSafariStyle() {
    if (safariStyleEl) safariStyleEl.remove();
    safariStyleEl = document.createElement('style');
    safariStyleEl.textContent = buildSafariPrintStyle();
    document.head.appendChild(safariStyleEl);
}

/* ═══════════════════════════════════════════════════════════════
   CHROME iOS — print qua iframe
   
   Chrome iOS bỏ qua @page size và tính paper width theo
   viewport (nhỏ hơn A4) → mỗi trang bị chia đôi → 34 trang.
   
   Giải pháp: tạo iframe ẩn với HTML print-ready hoàn toàn,
   kích thước px cứng đúng với paper Chrome iOS dùng,
   rồi gọi iframe.contentWindow.print().
═══════════════════════════════════════════════════════════════ */
function getBaseURL() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/') + 1);
}

function buildIframeHTML() {
    const base = getBaseURL();
    // Chrome iOS: paper width = screen portrait CSS px
    const pw  = Math.min(screen.width, screen.height);
    const ph  = Math.round(pw * 297 / 210);
    const ph2 = Math.round(ph / 2);

    const toAbs = (rel) => base + rel.replace(/^\.\//, '');

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-print-color-adjust:exact !important; }
@page { size:A4 portrait; margin:0; }
html, body { background:white; width:${pw}px; margin:0; padding:0; }
.page {
    display:block; width:${pw}px; height:${ph}px;
    overflow:hidden; background:white;
    page-break-after:always; break-after:page;
    page-break-inside:avoid; break-inside:avoid;
}
.page:last-child { page-break-after:avoid; break-after:avoid; }
.page > img { display:block; width:${pw}px; height:${ph}px; object-fit:fill; }
.split-page { display:flex; flex-direction:column; height:${ph}px; overflow:hidden; }
.split-half { flex:none; width:${pw}px; height:${ph2}px; overflow:hidden; }
.split-half img { display:block; width:${pw}px; height:${ph2}px; object-fit:fill; }
</style></head><body>`;

    PAGES.forEach(p => {
        if (p.type === 'split') {
            html += `<div class="page split-page">
  <div class="split-half"><img src="${toAbs(p.src)}"></div>
  <div class="split-half"><img src="${toAbs(p.src2)}"></div>
</div>`;
        } else {
            html += `<div class="page"><img src="${toAbs(p.src)}"></div>`;
        }
    });

    html += `</body></html>`;
    return html;
}

function printViaIframe(done) {
    document.getElementById('overlay-msg').textContent = 'Đang tải ảnh để in…';

    const old = document.getElementById('_pf');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id = '_pf';
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;';
    document.body.appendChild(iframe);

    iframe.contentDocument.open();
    iframe.contentDocument.write(buildIframeHTML());
    iframe.contentDocument.close();

    // Chờ toàn bộ ảnh trong iframe load xong
    function waitFrameImages(cb) {
        const imgs = Array.from(iframe.contentDocument.querySelectorAll('img'));
        let pending = imgs.filter(i => !i.complete).length;
        if (pending === 0) return cb();
        imgs.forEach(img => {
            if (!img.complete) {
                const fn = () => { if (--pending === 0) cb(); };
                img.addEventListener('load',  fn, { once:true });
                img.addEventListener('error', fn, { once:true });
            }
        });
    }

    waitFrameImages(() => {
        document.getElementById('overlay-msg').textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            document.getElementById('print-overlay').classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                if (done) done();
                setTimeout(() => iframe.remove(), 8000);
            }, 300);
        }, 400);
    });
}

/* ═══════════════════════════════════════════════════════════════
   CHỜ ẢNH TRANG HIỆN TẠI LOAD XONG
═══════════════════════════════════════════════════════════════ */
function waitMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let pending = imgs.filter(i => !i.complete).length;
    if (pending === 0) return cb();
    imgs.forEach(img => {
        if (!img.complete) {
            const fn = () => { if (--pending === 0) cb(); };
            img.addEventListener('load',  fn, { once:true });
            img.addEventListener('error', fn, { once:true });
        }
    });
}

/* ═══════════════════════════════════════════════════════════════
   MAIN PRINT — phân nhánh theo trình duyệt
═══════════════════════════════════════════════════════════════ */
function printProfile() {
    const overlay = document.getElementById('print-overlay');

    // Reset zoom trước khi in
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = '';
        p.style.marginTop = '';
        p.style.marginBottom = '';
    });
    document.querySelectorAll('.zoomInput').forEach(i => i.value = '100%');

    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (isChromeIOS) {
        /* Chrome iOS: print qua iframe để đảm bảo đúng paper size */
        printViaIframe();

    } else if (isSafariIOS) {
        /* Safari iOS: inject style px, rồi window.print() */
        injectSafariStyle();
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 900);
        });

    } else {
        /* Desktop Chrome/Firefox/Edge + Android Chrome: CSS mm đủ dùng */
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

/* Fallback khi người dùng bấm Ctrl+P trực tiếp */
window.addEventListener('beforeprint', () => {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = '';
        p.style.marginTop = '';
        p.style.marginBottom = '';
    });
    if (isSafariIOS) injectSafariStyle();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
