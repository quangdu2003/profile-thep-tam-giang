<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>THÉP TAM GIANG PROFILE</title>

<style>
/* ═══ RESET ═══════════════════════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#202124;
}

/* ═══ LAYOUT ══════════════════════════════════════════════════════ */
.viewer { display:flex; width:100%; height:100vh; }

/* ═══ SIDEBAR ═════════════════════════════════════════════════════ */
.sidebar {
    width:220px; background:#2b2b2b; overflow-y:auto;
    border-right:1px solid #3c4043; padding:14px 10px;
    display:flex; flex-direction:column; height:100vh; flex-shrink:0;
}
.thumb {
    width:100%; margin-bottom:16px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center;
}
.thumb-page {
    width:100%; aspect-ratio:210/297; background:#fff;
    padding:3px; overflow:hidden;
}
.thumb-page img { width:100%; height:100%; object-fit:cover; display:block; }
/* Thumb split: 2 ảnh xếp DỌC + đường kẻ đỏ nhỏ */
.thumb-page.split { display:flex; flex-direction:column; padding:0; }
.thumb-page.split img { flex:1; width:100%; object-fit:cover; display:block; min-height:0; }
.thumb-split-div { width:100%; height:2px; background:#c00; flex-shrink:0; }
.thumb span {
    display:block; text-align:center; color:#bbb;
    margin-top:5px; font-size:12px;
}
.thumb:hover .thumb-page { outline:2px solid #8ab4f8; }

/* ═══ MAIN ════════════════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; }

/* ═══ TOOLBAR ═════════════════════════════════════════════════════
   Dùng 3-cột grid: [title | center | right]
   → zoom luôn căn giữa chính xác, title + icons không bị đẩy
══════════════════════════════════════════════════════════════════ */
.toolbar {
    height:52px;
    background:#2b2b2b;
    border-bottom:1px solid #3c4043;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 12px;
    flex-shrink:0;
    gap:8px;
}
.toolbar-title {
    color:#fff; font-size:14px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    justify-self:start;
}
.toolbar-center { display:flex; align-items:center; justify-content:center; }
#zoom-controls { display:flex; align-items:center; gap:6px; }
#zoom-controls .zoom-btn {
    width:32px; height:32px;
    border:none; background:#3c4043; color:#fff;
    cursor:pointer; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:400; line-height:1;
    user-select:none; flex-shrink:0;
}
#zoom-controls .zoom-btn:hover { background:#5f6368; }
#zoom-controls .zoom-val {
    width:58px; height:28px;
    background:#202124; border:1px solid #5f6368;
    color:#fff; text-align:center;
    font-size:13px; outline:none; border-radius:3px;
}
.toolbar-right {
    display:flex; align-items:center; gap:8px;
    justify-self:end;
}
.tool-btn {
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    border-radius:4px; background:#3c4043;
    cursor:pointer; border:none; text-decoration:none; flex-shrink:0;
}
.tool-btn:hover { background:#4f5256; }
.tool-btn svg { width:20px; height:20px; fill:#fff; }

/* ═══ CONTENT ═════════════════════════════════════════════════════ */
.content {
    flex:1; overflow-x:hidden; overflow-y:auto;
    padding:24px 0; scroll-behavior:smooth;
}

/* ─── TRANG ĐƠN ─── */
.page {
    width:794px; height:1123px;
    background:#fff;
    margin:0 auto 24px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.6);
    position:relative; flex-shrink:0;
}
.page > img { width:100%; height:100%; display:block; object-fit:fill; }

/* ─── TRANG SPLIT: 2 ảnh xếp DỌC với đường kẻ đỏ tách ─── */
.split-page {
    display:flex !important;
    flex-direction:column !important;
}
.split-half {
    flex:1;
    width:100%;
    min-height:0;
    overflow:hidden;
    display:block;
}
.split-half img {
    width:100%; height:100%;
    object-fit:fill; display:block;
}
/* Đường kẻ đỏ tách 2 ảnh — hiển thị web + in */
.split-divider {
    width:100%; height:4px;
    background:#cc0000;
    flex-shrink:0;
}

/* ═══ MOBILE UI ═══════════════════════════════════════════════════
   Grid 3-cột cũng hoạt động tốt trên mobile.
   Chỉ điều chỉnh kích thước trang.
══════════════════════════════════════════════════════════════════ */
@media (max-width:768px) {
    .sidebar { display:none; }

    /* Toolbar mobile: thu nhỏ title, phóng to nút zoom */
    .toolbar { padding:0 8px; gap:4px; }
    .toolbar-title { font-size:11px; max-width:80px; }
    #zoom-controls .zoom-btn { width:36px; height:36px; font-size:24px; }
    #zoom-controls .zoom-val { width:52px; height:30px; font-size:12px; }
    .tool-btn { width:36px; height:36px; }

    /* Trang mobile: full width, tỉ lệ A4 */
    .page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
    .split-page {
        width:95vw !important;
        height:auto !important;
        aspect-ratio:210/297;
    }
    .split-divider { height:3px; }
}

/* ═══ PRINT: Desktop Chrome/Firefox/Edge ══════════════════════════ */
@media print {
    @page { size:A4 portrait; margin:0; }
    * {
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
    }
    .sidebar, .toolbar, #print-overlay { display:none !important; }

    html, body {
        background:white !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; margin:0 !important; padding:0 !important;
    }
    .viewer, .main, .content {
        display:block !important;
        width:210mm !important; height:auto !important;
        overflow:visible !important; background:white !important;
        padding:0 !important; margin:0 !important;
    }

    /* Trang đơn */
    .page {
        display:block !important;
        width:210mm !important;
        height:297mm !important;
        min-height:297mm !important; max-height:297mm !important;
        margin:0 !important; padding:0 !important;
        border:none !important; box-shadow:none !important;
        overflow:hidden !important; background:white !important;
        transform:none !important;
        page-break-after:always !important; break-after:page !important;
        page-break-inside:avoid !important; break-inside:avoid !important;
    }
    .page:last-child { page-break-after:avoid !important; break-after:avoid !important; }
    .page > img {
        width:210mm !important; height:297mm !important;
        object-fit:fill !important; display:block !important;
    }

    /* Trang split */
    .split-page {
        display:flex !important; flex-direction:column !important;
        width:210mm !important; height:297mm !important;
        overflow:hidden !important;
    }
    .split-half {
        flex:1 !important;
        width:210mm !important; min-height:0 !important;
        overflow:hidden !important; display:flex !important;
        align-items:stretch !important;
    }
    .split-half img {
        width:210mm !important; height:100% !important;
        object-fit:fill !important; display:block !important;
    }
    .split-divider {
        width:210mm !important; height:4px !important;
        background:#cc0000 !important;
        flex-shrink:0 !important; display:block !important;
    }
}

/* ═══ OVERLAY ═════════════════════════════════════════════════════ */
#print-overlay {

}
@keyframes spin { to { transform:rotate(360deg); } }

<script>
/* ═══ ZOOM ═══════════════════════════════════════════════════════ */
let zoomLevel = 100;
const contentEl = document.getElementById('content');

function updateZoom() {
    document.querySelectorAll('.page').forEach(p => {
        p.style.transformOrigin = 'top center';
        p.style.transform = `scale(${zoomLevel / 100})`;
        const h = p.offsetHeight;
        const diff = h - h * zoomLevel / 100;
        p.style.marginTop    = `${-diff / 2}px`;
        p.style.marginBottom = `${24 - diff / 2}px`;
    });
    document.querySelectorAll('.zoom-val').forEach(el => el.value = zoomLevel + '%');
}
function zoomIn()  { if (zoomLevel < 200) { zoomLevel += 10; updateZoom(); } }
function zoomOut() { if (zoomLevel > 30)  { zoomLevel -= 10; updateZoom(); } }

function scrollToPage(idx) {
    const el = document.getElementById('p' + idx);
    if (el) contentEl.scrollTo({ top: el.offsetTop - 16, behavior: 'smooth' });
}
function resetZoom() {
    zoomLevel = 100;
    document.querySelectorAll('.page').forEach(p => {
        p.style.transform = p.style.marginTop = p.style.marginBottom = '';
    });
    document.querySelectorAll('.zoom-val').forEach(el => el.value = '100%');
}

/* ═══ DETECT BROWSER ════════════════════════════════════════════ */
const ua = navigator.userAgent;
const isIOS           = /iP(hone|ad|od)/i.test(ua);
const isChromeIOS     = /CriOS/i.test(ua);
const isSafariIOS     = isIOS && /WebKit/i.test(ua) && !isChromeIOS && !/FxiOS|OPiOS/i.test(ua);
const isAndroid       = /Android/i.test(ua);
const isChromeAndroid = isAndroid && /Chrome/i.test(ua) && !/Firefox/i.test(ua);
/* Cả Chrome iOS và Chrome Android đều cần iframe để in đúng 17 trang */
const needsIframe     = isChromeIOS || isChromeAndroid;

/* ═══ DANH SÁCH TRANG ═══════════════════════════════════════════ */
const PAGES = [
    {t:'s', src:'./profile-cover.jpg'},
    {t:'s', src:'./company-intro-01.jpg'},
    {t:'s', src:'./company-intro-02.jpg'},
    {t:'s', src:'./main-products.jpg'},

    {t:'s', src:'./project-12.jpg'},
    {t:'s', src:'./project-03.jpg'},
    {t:'s', src:'./project-08.jpg'},
    {t:'s', src:'./project-09.jpg'},
    {t:'s', src:'./project-10.jpg'},
    {t:'2', src:'./project-04.jpg', src2:'./project-07.jpg'},
    {t:'s', src:'./project-01.jpg'},
    {t:'s', src:'./project-02.jpg'},
];

function getBase() {
    const h = window.location.href;
    return h.substring(0, h.lastIndexOf('/') + 1);
}

/* ═══════════════════════════════════════════════════════════════
   IFRAME PRINT (Chrome iOS + Chrome Android)
   ---------------------------------------------------------------
   A4 @ 96 dpi = 794 × 1123 px.
   Iframe body width = 794px → Chrome tự map sang A4 paper.
   Mỗi .page height = 1123px + page-break-after → đúng 1 tờ/trang.
   Split: 2 nửa × 559px + divider 4px = 1122px ≈ 1123px.
═══════════════════════════════════════════════════════════════ */
function buildIframeHTML() {
    const base = getBase();
    const W = 794, H = 1123, H2 = 559, DH = 4;
    const abs = r => base + r.replace(/^\.\//, '');

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
@page{size:A4 portrait;margin:0}
html,body{width:${W}px;margin:0;padding:0;background:#fff}
.p{width:${W}px;height:${H}px;overflow:hidden;background:#fff;
   page-break-after:always;break-after:page;
   page-break-inside:avoid;break-inside:avoid;display:block}
.p:last-child{page-break-after:avoid;break-after:avoid}
.p>img{display:block;width:${W}px;height:${H}px;object-fit:fill}
.sp{display:flex;flex-direction:column;height:${H}px;overflow:hidden}
.sh{flex:none;width:${W}px;height:${H2}px;overflow:hidden}
.sh img{display:block;width:${W}px;height:${H2}px;object-fit:fill}
.sd{width:${W}px;height:${DH}px;background:#cc0000;flex-shrink:0}
</style></head><body>`;

    PAGES.forEach(p => {
        if (p.t === '2') {
            html += `<div class="p sp"><div class="sh"><img src="${abs(p.src)}"></div>`
                  + `<div class="sd"></div><div class="sh"><img src="${abs(p.src2)}"></div></div>`;
        } else {
            html += `<div class="p"><img src="${abs(p.src)}"></div>`;
        }
    });
    return html + `</body></html>`;
}

function printViaIframe() {
    const msgEl = document.getElementById('overlay-msg');
    msgEl.textContent = 'Đang tải ảnh để in…';
    const old = document.getElementById('_pf');
    if (old) old.remove();

    const iframe = document.createElement('iframe');
    iframe.id = '_pf';
    /* Width phải đủ rộng để iframe render đúng layout 794px */
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:800px;height:2px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument;
    doc.open(); doc.write(buildIframeHTML()); doc.close();

    function waitImgs(cb) {
        const imgs = Array.from(doc.querySelectorAll('img'));
        let n = imgs.filter(i => !i.complete).length;
        if (!n) return cb();
        imgs.forEach(img => {
            if (!img.complete) {
                const fn = () => { if (!--n) cb(); };
                img.addEventListener('load',  fn, {once:true});
                img.addEventListener('error', fn, {once:true});
            }
        });
    }

    waitImgs(() => {
        msgEl.textContent = 'Đang mở hộp thoại in…';
        setTimeout(() => {
            document.getElementById('print-overlay').classList.remove('show');
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => iframe.remove(), 12000);
            }, 300);
        }, 400);
    });
}

/* ═══════════════════════════════════════════════════════════════
   SAFARI iOS PRINT
   ---------------------------------------------------------------
   Safari iOS bỏ qua @page size.
   Paper CSS width = Math.min(screen.width, screen.height).
   Inject style với px tuyệt đối → đảm bảo đủ 1 trang A4 thật.
═══════════════════════════════════════════════════════════════ */
let _safariStyleEl = null;
function buildSafariStyle() {
    /*
     * Screen portrait px. Trên iPhone, screen.width < screen.height.
     * Nếu user đang landscape thì screen.width > screen.height → lấy min.
     */
    const pw  = Math.min(screen.width, screen.height);
    const ph  = Math.round(pw * 297 / 210);
    const ph2 = Math.floor((ph - 4) / 2); /* nửa trang (trừ 4px divider) */

    return `@media print{
@page{size:A4 portrait;margin:0!important}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
#print-overlay,.sidebar,.toolbar{display:none!important}
html,body{background:#fff!important;width:${pw}px!important;
  height:auto!important;margin:0!important;padding:0!important;overflow:visible!important}
.viewer,.main,.content{display:block!important;width:${pw}px!important;
  height:auto!important;margin:0!important;padding:0!important;
  overflow:visible!important;background:#fff!important}
.page{display:block!important;width:${pw}px!important;
  height:${ph}px!important;min-height:${ph}px!important;max-height:${ph}px!important;
  margin:0!important;padding:0!important;border:none!important;box-shadow:none!important;
  overflow:hidden!important;background:#fff!important;transform:none!important;
  page-break-after:always!important;break-after:page!important;
  page-break-inside:avoid!important;break-inside:avoid!important}
.page:last-child{page-break-after:avoid!important;break-after:avoid!important}
.page>img{width:${pw}px!important;height:${ph}px!important;
  object-fit:fill!important;display:block!important}
.split-page{display:flex!important;flex-direction:column!important;
  height:${ph}px!important;overflow:hidden!important}
.split-half{flex:none!important;width:${pw}px!important;height:${ph2}px!important;
  overflow:hidden!important;display:block!important}
.split-half img{width:${pw}px!important;height:${ph2}px!important;
  object-fit:fill!important;display:block!important}
.split-divider{width:${pw}px!important;height:4px!important;
  background:#cc0000!important;display:block!important;flex-shrink:0!important}
}`;
}

function injectSafariStyle() {
    if (_safariStyleEl) _safariStyleEl.remove();
    _safariStyleEl = document.createElement('style');
    _safariStyleEl.textContent = buildSafariStyle();
    document.head.appendChild(_safariStyleEl);
}

/* ═══ WAIT IMAGES ════════════════════════════════════════════════ */
function waitMainImages(cb) {
    const imgs = Array.from(document.querySelectorAll('.content img'));
    let n = imgs.filter(i => !i.complete).length;
    if (!n) return cb();
    imgs.forEach(img => {
        if (!img.complete) {
            const fn = () => { if (!--n) cb(); };
            img.addEventListener('load',  fn, {once:true});
            img.addEventListener('error', fn, {once:true});
        }
    });
}

/* ═══ MAIN PRINT ═════════════════════════════════════════════════ */
function printProfile() {
    const overlay = document.getElementById('print-overlay');
    resetZoom();
    overlay.classList.add('show');
    document.getElementById('overlay-msg').textContent = 'Đang chuẩn bị in…';

    if (needsIframe) {
        /* Chrome iOS + Chrome Android: iframe với kích thước A4 px cứng */
        printViaIframe();
    } else if (isSafariIOS) {
        /* Safari iOS: inject px style rồi window.print() */
        injectSafariStyle();
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 300);
            }, 800);
        });
    } else {
        /* Desktop Chrome / Firefox / Edge / Firefox Android */
        waitMainImages(() => {
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => window.print(), 200);
            }, 400);
        });
    }
}

/* Ctrl+P fallback */
window.addEventListener('beforeprint', () => {
    resetZoom();
    if (isSafariIOS) injectSafariStyle();
});
window.addEventListener('afterprint', () => {
    document.getElementById('print-overlay').classList.remove('show');
});
</script>
