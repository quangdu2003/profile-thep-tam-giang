<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>THÉP TAM GIANG PROFILE</title>
    <link rel="icon" href="./profile-cover-removebg-preview.png">
    <style>
        /* ═══ RESET & BASE ═══ */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; font-family:Arial, sans-serif; background:#202124; }
        .viewer { display:flex; width:100%; height:100vh; }

        /* ═══ SIDEBAR (18 TRANG) ═══ */
        .sidebar { width:200px; background:#2b2b2b; overflow-y:auto; border-right:1px solid #3c4043; padding:12px 8px; display:flex; flex-direction:column; height:100vh; flex-shrink:0; }
        .thumb { width:100%; margin-bottom:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
        .thumb-inner { width:100%; aspect-ratio:210/297; background:#fff; overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .thumb-inner img { width:100%; height:100%; object-fit:contain; display:block; }
        .thumb span { display:block; text-align:center; color:#bbb; margin-top:4px; font-size:12px; }
        .thumb:hover .thumb-inner { outline:2px solid #8ab4f8; }

        /* ═══ MAIN & TOOLBAR ═══ */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#1e1e1e; position: relative; }
        .toolbar { height:52px; background:#2b2b2b; border-bottom:1px solid #3c4043; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 14px; flex-shrink:0; }
        .toolbar-title { color:#fff; font-size:14px; font-weight:600; }
        .zoom-btn { width:32px; height:32px; background:#3c4043; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:20px; }
        .zoom-val { width:60px; height:28px; background:#202124; border:1px solid #5f6368; color:#fff; text-align:center; margin:0 5px; }
        .tool-btn { width:34px; height:34px; background:#3c4043; border-radius:4px; display:flex; align-items:center; justify-content:center; border:none; text-decoration:none; }
        .tool-btn svg { width:20px; height:20px; fill:#fff; }

        /* ═══ CONTENT ═══ */
        .content { flex:1; overflow-x:hidden; overflow-y:auto; padding:24px 0; scroll-behavior:smooth; }
        .page { width:794px; height:1123px; background:#fff; margin:0 auto 24px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.6); position:relative; }
        .page img { width:100%; height:100%; display:block; object-fit:fill; }

        /* Trang gộp (Trang 15 nội dung) */
        .split-page { background:#d0d0d0 !important; display:flex !important; flex-direction:column !important; padding:16px !important; gap:0 !important; }
        .split-half { flex:1; overflow:hidden; background:#fff; display:flex; align-items:center; justify-content:center; }
        .split-half img { max-width:100%; max-height:100%; object-fit:contain; }
        .split-gap { height:20px; background:#d0d0d0; }

        /* ═══ MOBILE UI ═══ */
        @media (max-width:768px) {
            .sidebar { display:none; }
            .toolbar { display:flex; flex-direction:column; height:auto; padding:10px; }
            .toolbar-center, .toolbar-right { display:none; }
            .mobile-tools { display:flex; width:100%; justify-content:space-between; align-items:center; margin-top:10px; }
            .page { width:95vw !important; height:auto !important; aspect-ratio:210/297; }
        }

        /* ═══ SIÊU FIX IN ẤN (MOBILE & DESKTOP) ═══ */
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* Ẩn sạch giao diện thừa */
            .sidebar, .toolbar, .mobile-tools, #print-overlay { display: none !important; }

            html, body { 
                background: white !important; 
                overflow: visible !important; 
                height: auto !important;
                width: 210mm !important;
            }

            .viewer, .main, .content { 
                display: block !important; 
                width: 100% !important; 
                height: auto !important; 
                padding: 0 !important; 
                margin: 0 !important;
                overflow: visible !important;
            }

            .page { 
                display: block !important;
                width: 210mm !important; 
                height: 297mm !important; /* Ép cứng chiều cao A4 */
                margin: 0 0 -1px 0 !important; /* Gối nhẹ trang để xoá footer */
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                page-break-after: always !important;
                break-after: page !important;
            }

            .page img { 
                width: 100% !important; 
                height: 100% !important; 
                object-fit: fill !important; 
            }

            /* Xử lý trang gộp khi in */
            .split-page { padding: 10mm !important; gap: 0 !important; }
            .split-gap { height: 10mm !important; }
            .split-half img { object-fit: contain !important; }
        }

        /* Overlay */
        #print-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
        #print-overlay.show { display:flex; }
        .spinner { width:40px; height:40px; border:4px solid #333; border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="print-overlay">
    <div class="spinner"></div>
    <div style="margin-top:15px">Đang tối ưu trang in...</div>
</div>

<div class="viewer">
    <div class="sidebar">
        <!-- Sidebar giờ có 18 thumbnail cho chuẩn -->
        <script>
            const thumbImgs = [
                'profile-cover.jpg','company-intro-01.jpg','company-intro-02.jpg','main-products.jpg',
                'thep-products.jpg','ximang-products.jpg','thephinh-products.jpg','vlxd-products.jpg',
                'project-11.jpg','project-12.jpg','project-03.jpg','project-08.jpg','project-09.jpg',
                'project-10.jpg','project-04.jpg','project-07.jpg','project-01.jpg','project-02.jpg'
            ];
            thumbImgs.forEach((src, i) => {
                document.write(`
                    <div class="thumb" onclick="scrollToPage(${i})">
                        <div class="thumb-inner"><img src="./${src}" loading="lazy"></div>
                        <span>${i+1}</span>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="main">
        <div class="toolbar">
            <div class="toolbar-title">THÉP TAM GIANG PROFILE</div>
            <div class="toolbar-center">
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <input type="text" class="zoom-val" id="zoom-display" value="100%" readonly>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
            </div>
            <div class="toolbar-right">
                <a href="https://drive.google.com/uc?export=download&id=1-CbOZUOEgPujQ9oRuHAX8_ACFzOTI5JP" class="tool-btn" title="Tải xuống">
                    <svg viewBox="0 -960 960 960"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
                </a>
                <button class="tool-btn" onclick="handlePrint()">
                    <svg viewBox="0 -960 960 960"><path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z"/></svg>
                </button>
            </div>
            <!-- Mobile Row -->
            <div class="mobile-tools" id="m-tools" style="display:none">
                 <div style="display:flex; align-items:center;">
                    <button class="zoom-btn" onclick="zoomOut()">−</button>
                    <input type="text" class="zoom-val" id="zoom-display-m" value="100%" readonly>
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                 </div>
                 <div style="display:flex; gap:10px;">
                    <a href="https://drive.google.com/uc?export=download&id=1-CbOZUOEgPujQ9oRuHAX8_ACFzOTI5JP" class="tool-btn"><svg viewBox="0 -960 960 960"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg></a>
                    <button class="tool-btn" onclick="handlePrint()"><svg viewBox="0 -960 960 960"><path d="M648-624v-120H312v120h-72v-192h480v192h-72Zm-480 72h625-625Zm539.79 96q15.21 0 25.71-10.29t10.5-25.5q0-15.21-10.29-25.71t-25.5-10.5q-15.21 0-25.71 10.29t-10.5 25.5q0 15.21 10.29 25.71t25.5 10.5ZM648-216v-144H312v144h336Zm72 72H240v-144H96v-240q0-40 28-68t68-28h576q40 0 68 28t28 68v240H720v144Z"/></svg></button>
                 </div>
            </div>
        </div>

        <div class="content" id="content">
            <!-- Render 17 trang thực tế -->
            <section class="page" id="p0"><img src="./profile-cover.jpg"></section>
            <section class="page" id="p1"><img src="./company-intro-01.jpg"></section>
            <section class="page" id="p2"><img src="./company-intro-02.jpg"></section>
            <section class="page" id="p3"><img src="./main-products.jpg"></section>
            <section class="page" id="p4"><img src="./thep-products.jpg"></section>
            <section class="page" id="p5"><img src="./ximang-products.jpg"></section>
            <section class="page" id="p6"><img src="./thephinh-products.jpg"></section>
            <section class="page" id="p7"><img src="./vlxd-products.jpg"></section>
            <section class="page" id="p8"><img src="./project-11.jpg"></section>
            <section class="page" id="p9"><img src="./project-12.jpg"></section>
            <section class="page" id="p10"><img src="./project-03.jpg"></section>
            <section class="page" id="p11"><img src="./project-08.jpg"></section>
            <section class="page" id="p12"><img src="./project-09.jpg"></section>
            <section class="page" id="p13"><img src="./project-10.jpg"></section>
            <section class="page split-page" id="p14">
                <div class="split-half"><img src="./project-04.jpg"></div>
                <div class="split-gap"></div>
                <div class="split-half"><img src="./project-07.jpg"></div>
            </section>
            <!-- Do thumbnail tách riêng 15,16 nên map ID chính xác -->
            <section class="page" id="p16"><img src="./project-01.jpg"></section>
            <section class="page" id="p17"><img src="./project-02.jpg"></section>
        </div>
    </div>
</div>

<script>
    /* ─── UI ─── */
    function checkMob() {
        const isMob = window.innerWidth <= 768;
        document.getElementById('m-tools').style.display = isMob ? 'flex' : 'none';
    }
    window.addEventListener('resize', checkMob);
    checkMob();

    /* ─── ZOOM ─── */
    let zoom = 100;
    function updateZoom() {
        document.querySelectorAll('.page').forEach(p => {
            p.style.transform = `scale(${zoom/100})`;
            p.style.transformOrigin = 'top center';
        });
        document.getElementById('zoom-display').value = zoom + '%';
        document.getElementById('zoom-display-m').value = zoom + '%';
    }
    function zoomIn() { if(zoom < 200) { zoom += 10; updateZoom(); } }
    function zoomOut() { if(zoom > 50) { zoom -= 10; updateZoom(); } }
    function scrollToPage(i) {
        // Map lại index cho trang 15,16,17 do trang gộp
        let id = i;
        if(i === 15) id = 14; // thumbnail 16 vào nửa dưới trang 15? Không, thumbnail 15,16 là 2 ảnh trang gộp
        if(i === 14) id = 14; 
        if(i > 15) id = i - 1; // 17 -> p16, 18 -> p17
        const el = document.getElementById('p' + id);
        if(el) document.getElementById('content').scrollTo({top: el.offsetTop - 10, behavior:'smooth'});
    }

    /* ─── SIÊU FIX IN ẤN ─── */
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isChrome = /Chrome|CriOS/.test(navigator.userAgent);

    function handlePrint() {
        const overlay = document.getElementById('print-overlay');
        overlay.classList.add('show');
        
        // Reset zoom để không bị lệch layout khi in
        const oldZoom = zoom;
        zoom = 100;
        updateZoom();

        // Đợi render và ảnh load xong
        setTimeout(() => {
            overlay.classList.remove('show');
            window.print();
            // Trả lại zoom cũ sau khi đóng hộp thoại in
            zoom = oldZoom;
            updateZoom();
        }, 1200);
    }

    // Fix lỗi 34 trang trên Chrome Mobile bằng cách ép viewport
    window.addEventListener('beforeprint', () => {
        if(window.innerWidth <= 768) {
            // Ép kích thước màn hình ảo để trình duyệt tính toán đúng A4
            document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=1024');
        }
    });
    window.addEventListener('afterprint', () => {
        document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0');
    });
</script>
</body>
</html>
